name: Build And Deploy (K8s)

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ho-api
  DEPLOY_BRANCH: main
  DEPLOY_NAMESPACE: ho
  DEPLOY_RELEASE: ho
  DEPLOY_VALUES_FILE: ./charts/ho-stack/values-prod.yaml
  DEPLOY_ACTIVE_REPLICAS: "4"
  DEPLOY_STANDBY_REPLICAS: "1"
  DEPLOY_RUN_MIGRATION: "true"
  DEPLOY_REQUIRE_CLUSTER: "false"
  DEPLOY_PUBLIC_HEALTHCHECK_URL: "https://api.finde345.site/healthz"

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_repository=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest

  deploy:
    name: One-click deploy to Kubernetes
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}
          fetch-depth: 0
          clean: true

      - name: Pull latest code before deploy
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin "${DEPLOY_BRANCH}" --prune
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
          git pull --ff-only origin "${DEPLOY_BRANCH}"
          echo "Deploy commit: $(git rev-parse --short HEAD)"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: One-click publish script
        env:
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: bash scripts/deploy/release-k8s.sh
