# CI/CD — 微服务构建 & Swarm 自动部署
#
# push to main / workflow_dispatch → 类型检查 → 构建 5 个镜像 → SSH 部署到 Swarm → 健康检查
# PR to main                       → 类型检查 → 构建（不推送、不部署）

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (leave blank = SHA)"
        required: false
        default: ""

# 同分支只保留最后一次运行
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  STACK_NAME: ecom
  SWARM_DOMAIN: api.find345.site

# ─── Jobs ────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Job ① 类型检查 ──────────────────────────────────────────────────────────
  check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ─── Job ② 并行构建 5 个微服务镜像 ──────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service.name }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER_LC}/ecom-${{ matrix.service.name }}"
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Build summary
        run: |
          echo "### ${{ matrix.service.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pushed**: \`${{ github.event_name != 'pull_request' }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Job ③ SSH 部署到 Swarm Manager ─────────────────────────────────────────
  deploy:
    name: Deploy to Swarm
    needs: build-images
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout (for stack file)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra

      - name: Copy stack configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "infra/"
          target: /opt/ecom

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ steps.vars.outputs.registry }}"
            TAG="${{ steps.vars.outputs.tag }}"
            STACK="${{ env.STACK_NAME }}"

            # 登录 GHCR（用于 --with-registry-auth 转发凭证到 Worker 节点）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            SERVICES="api-gateway user-service product-service cart-service order-service"

            # 移除旧的非 ecom stack（如果存在），释放端口
            for OLD_STACK in $(docker stack ls --format '{{.Name}}' 2>/dev/null); do
              if [ "${OLD_STACK}" != "${STACK}" ]; then
                echo "Removing old stack: ${OLD_STACK}"
                docker stack rm "${OLD_STACK}"
                echo "Waiting for old stack to drain..."
                for _ in $(seq 1 12); do
                  REMAINING=$(docker service ls --filter "name=${OLD_STACK}_" -q 2>/dev/null | wc -l)
                  [ "${REMAINING}" -eq 0 ] && break
                  sleep 5
                done
                echo "✓ Old stack removed"
              fi
            done

            # docker stack deploy 是幂等的：首次创建全部服务，后续应用配置变更 + 镜像更新
            cd /opt/ecom/infra/swarm
            echo "══════════════════════════════════════════"
            echo "Deploying stack ${STACK} (tag: ${TAG})"
            echo "══════════════════════════════════════════"

            REGISTRY="${REGISTRY}" TAG="${TAG}" \
              docker stack deploy \
                --compose-file docker-stack.yml \
                --with-registry-auth \
                "${STACK}"

            # 等待每个应用服务收敛
            for SVC in ${SERVICES}; do
              echo ""
              echo "Waiting for ${STACK}_${SVC} to converge..."
              TIMEOUT=180
              ELAPSED=0
              while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
                # 检查是否所有副本都 Running
                REPLICAS=$(docker service ls --filter "name=${STACK}_${SVC}" --format '{{.Replicas}}' 2>/dev/null || echo "0/0")
                CURRENT=$(echo "${REPLICAS}" | cut -d'/' -f1)
                DESIRED=$(echo "${REPLICAS}" | cut -d'/' -f2)

                if [ "${CURRENT}" = "${DESIRED}" ] && [ "${DESIRED}" != "0" ]; then
                  echo "✓ ${SVC} ready (${REPLICAS})"
                  break
                fi

                # 检查滚动更新是否失败
                STATE=$(docker service inspect --format '{{.UpdateStatus.State}}' "${STACK}_${SVC}" 2>/dev/null || echo "")
                case "${STATE}" in
                  rollback_completed)
                    echo "✗ ${SVC} rolled back! Aborting pipeline."
                    docker service ps "${STACK}_${SVC}" --no-trunc 2>/dev/null | head -5
                    exit 1
                    ;;
                  paused)
                    echo "✗ ${SVC} update paused! Aborting pipeline."
                    docker service ps "${STACK}_${SVC}" --no-trunc 2>/dev/null | head -5
                    exit 1
                    ;;
                esac

                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done

              if [ ${ELAPSED} -ge ${TIMEOUT} ]; then
                echo "✗ ${SVC} did not converge within ${TIMEOUT}s"
                docker service ps "${STACK}_${SVC}" --no-trunc 2>/dev/null | head -5
                exit 1
              fi
            done

            echo ""
            echo "══════════ Final status ══════════"
            docker service ls --filter "name=${STACK}_"

  # ─── Job ④ 外部健康检查 ─────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: deploy
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          URL="https://${{ env.SWARM_DOMAIN }}/health"
          echo "Smoke testing: ${URL}"

          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              --max-time 10 \
              -X POST "${URL}" 2>/dev/null) || HTTP_CODE="000"

            if [ "${HTTP_CODE}" = "200" ]; then
              echo "✓ Health check passed (attempt ${i}/20)"
              cat /tmp/health.json
              exit 0
            fi

            echo "  attempt ${i}/20 — HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 20 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::12}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Domain** | [https://${{ env.SWARM_DOMAIN }}](https://${{ env.SWARM_DOMAIN }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${GITHUB_EVENT_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${GITHUB_ACTOR}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Services" >> "$GITHUB_STEP_SUMMARY"
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          for SVC in api-gateway user-service product-service cart-service order-service; do
            echo "- \`ghcr.io/${OWNER_LC}/ecom-${SVC}:${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done
