name: Build And Deploy (K8s)

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ho-api
  DEPLOY_NAMESPACE: ho
  DEPLOY_RELEASE: ho
  DEPLOY_VALUES_FILE: ./charts/ho-stack/values-prod.yaml
  DEPLOY_ACTIVE_REPLICAS: "4"
  DEPLOY_STANDBY_REPLICAS: "1"
  DEPLOY_RUN_MIGRATION: "true"
  DEPLOY_REQUIRE_CLUSTER: "true"
  DEPLOY_PUBLIC_HEALTHCHECK_URL: "https://api.finde345.site/healthz"

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_repository=ghcr.io/${OWNER_LC}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest

  deploy:
    name: Blue/Green deploy to Kubernetes
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Write kubeconfig (optional)
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -n "${KUBE_CONFIG_DATA:-}" ]; then
            mkdir -p "$HOME/.kube"
            echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
            echo "kubeconfig loaded from KUBE_CONFIG_DATA"
          else
            echo "KUBE_CONFIG_DATA not set, use runner default kubeconfig if present"
          fi

      - name: Check Kubernetes connectivity
        id: k8s_check
        run: |
          if kubectl --request-timeout=10s cluster-info >/dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "Kubernetes cluster is reachable"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            if [ "${DEPLOY_REQUIRE_CLUSTER}" = "true" ]; then
              echo "::error::No reachable Kubernetes cluster in this runner context."
              exit 1
            fi
            echo "::warning::No reachable Kubernetes cluster in this runner context; deployment will be skipped."
          fi

      - name: Deploy with blue/green script
        if: steps.k8s_check.outputs.reachable == 'true'
        env:
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          export NAMESPACE="${DEPLOY_NAMESPACE}"
          export RELEASE="${DEPLOY_RELEASE}"
          export VALUES_FILE="${DEPLOY_VALUES_FILE}"
          export API_ACTIVE_REPLICAS="${DEPLOY_ACTIVE_REPLICAS}"
          export API_STANDBY_REPLICAS="${DEPLOY_STANDBY_REPLICAS}"
          export RUN_MIGRATION="${DEPLOY_RUN_MIGRATION}"
          bash scripts/deploy/bluegreen-k8s.sh

      - name: Smoke test (cluster gateway)
        if: steps.k8s_check.outputs.reachable == 'true'
        run: |
          CADDY_SVC="${DEPLOY_RELEASE}-ho-stack-caddy"
          kubectl -n "${DEPLOY_NAMESPACE}" rollout status deployment/"${CADDY_SVC}" --timeout=180s

          kubectl -n "${DEPLOY_NAMESPACE}" port-forward svc/"${CADDY_SVC}" 18080:80 >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill ${PF_PID} >/dev/null 2>&1 || true' EXIT
          sleep 3

          for i in $(seq 1 20); do
            if curl -fsS --max-time 3 http://127.0.0.1:18080/ >/tmp/smoke-cluster.out; then
              echo "Cluster smoke test passed"
              exit 0
            fi
            sleep 3
          done

          echo "::error::Cluster smoke test failed"
          cat /tmp/port-forward.log || true
          exit 1

      - name: Smoke test (public domain)
        if: steps.k8s_check.outputs.reachable == 'true'
        run: |
          if [ -z "${DEPLOY_PUBLIC_HEALTHCHECK_URL}" ]; then
            echo "DEPLOY_PUBLIC_HEALTHCHECK_URL is empty, skip public smoke test"
            exit 0
          fi

          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "${DEPLOY_PUBLIC_HEALTHCHECK_URL}" >/tmp/smoke-public.out; then
              echo "Public smoke test passed: ${DEPLOY_PUBLIC_HEALTHCHECK_URL}"
              exit 0
            fi
            sleep 5
          done

          echo "::error::Public smoke test failed: ${DEPLOY_PUBLIC_HEALTHCHECK_URL}"
          exit 1
