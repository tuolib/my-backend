name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app

            git pull origin main

            echo "Building api-blue..."
            docker compose build api-blue

            echo "Starting api-blue..."
            docker compose up -d api-blue

            echo "Checking container..."

            CONTAINER_ID=$(docker compose ps -q api-blue)

            if [ -z "$CONTAINER_ID" ]; then
              echo "❌ api-blue container not found!"
              echo "Dumping compose status:"
              docker compose ps
              exit 1
            fi

            echo "Container ID: $CONTAINER_ID"

            echo "Waiting for health..."

            while true; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null)

              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Container healthy"
                break
              fi

              if [ "$STATUS" = "unhealthy" ]; then
                echo "❌ Container unhealthy"
                docker logs "$CONTAINER_ID"
                exit 1
              fi

              sleep 2
            done