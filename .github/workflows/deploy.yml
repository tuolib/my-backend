name: Build & Deploy

# ─── 触发条件 ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deploy mode (auto / single / multi)"
        required: false
        default: "auto"
      image_tag:
        description: "Image tag to deploy (leave blank = build from current commit)"
        required: false
        default: ""

# 同分支只保留最后一次运行
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ho-api
  STACK_NAME: ${{ vars.STACK_NAME || 'ho' }}
  DEPLOY_BRANCH: main
  SWARM_DOMAIN: ${{ vars.SWARM_DOMAIN || 'api.find345.site' }}
  DEPLOY_MODE: ${{ inputs.deploy_mode || vars.DEPLOY_MODE || 'auto' }}
  API_REPLICAS_SINGLE: ${{ vars.API_REPLICAS_SINGLE || '2' }}
  API_REPLICAS_MULTI: ${{ vars.API_REPLICAS_MULTI || '10' }}
  DB_POOL_MAX: ${{ vars.DB_POOL_MAX || '5' }}
  DB_STRICT_READ_READINESS: ${{ vars.DB_STRICT_READ_READINESS || 'false' }}
  LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
  PGBOUNCER_MAX_CLIENT_CONN: ${{ vars.PGBOUNCER_MAX_CLIENT_CONN || '5000' }}
  PGBOUNCER_DEFAULT_POOL_SIZE: ${{ vars.PGBOUNCER_DEFAULT_POOL_SIZE || '500' }}
  PGBOUNCER_RESERVE_POOL_SIZE: ${{ vars.PGBOUNCER_RESERVE_POOL_SIZE || '100' }}
  POSTGRES_DB: ${{ vars.POSTGRES_DB || 'mydb' }}
  POSTGRES_USER: ${{ vars.POSTGRES_USER || 'user' }}
  RUN_MIGRATION: ${{ vars.RUN_MIGRATION || 'true' }}

# ─── Job 1: 类型检查 + 构建镜像 ───────────────────────────────────────────────
jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 计算镜像坐标：owner 转小写，tag 取 commit SHA 前 12 位
      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="${OWNER_LC}/${IMAGE_NAME}"
          # workflow_dispatch 可传入已有 tag，否则用 SHA
          CUSTOM_TAG="${{ inputs.image_tag }}"
          if [[ -n "${CUSTOM_TAG}" ]]; then
            TAG="${CUSTOM_TAG}"
          else
            TAG="${GITHUB_SHA::12}"
          fi
          echo "image_repository=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}"                  >> "$GITHUB_OUTPUT"

      # 只在 main push / workflow_dispatch 时才推送镜像
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest
          # 利用 GitHub Actions Cache 加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "### Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pushed**: \`${{ github.event_name != 'pull_request' }}\`" >> "$GITHUB_STEP_SUMMARY"

# ─── Job 2: 部署到 Swarm（仅 main push / workflow_dispatch） ─────────────────
  deploy:
    name: Deploy to Swarm
    needs: build
    if: github.event_name != 'pull_request'
    # 在 Swarm manager 节点上运行的 self-hosted runner
    runs-on: [self-hosted, linux, swarm-manager]
    timeout-minutes: 30
    environment:
      name: production
      url: https://${{ vars.SWARM_DOMAIN || 'api.find345.site' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}
          fetch-depth: 1
          clean: true

      - name: Pull latest code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin "${DEPLOY_BRANCH}" --prune
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
          git pull --ff-only origin "${DEPLOY_BRANCH}"
          echo "Deploy commit: $(git rev-parse --short HEAD)"

      - name: Verify Swarm manager
        run: |
          command -v docker || { echo "::error::docker not found"; exit 1; }
          [[ "$(docker info --format '{{.Swarm.LocalNodeState}}')" == "active" ]] \
            || { echo "::error::Swarm not active"; exit 1; }
          docker node ls >/dev/null || { echo "::error::Not a swarm manager"; exit 1; }

      - name: Log in to GHCR on manager
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Render .env.swarm
        run: |
          cat > swarm/.env.swarm <<EOF
          STACK_NAME=${STACK_NAME}
          SWARM_DOMAIN=${SWARM_DOMAIN}
          DEPLOY_MODE=${DEPLOY_MODE}
          IMAGE_REPOSITORY=${{ needs.build.outputs.image_repository }}
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          API_REPLICAS_SINGLE=${API_REPLICAS_SINGLE}
          API_REPLICAS_MULTI=${API_REPLICAS_MULTI}
          DB_POOL_MAX=${DB_POOL_MAX}
          DB_STRICT_READ_READINESS=${DB_STRICT_READ_READINESS}
          LOG_LEVEL=${LOG_LEVEL}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=password
          POSTGRES_REPLICATION_PASSWORD=repl_password
          PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN}
          PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE}
          PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE}
          JWT_SECRET=change-me-in-prod
          RUN_MIGRATION=${RUN_MIGRATION}
          EOF

      - name: Deploy stack
        run: bash scripts/swarm/deploy-stack.sh

      - name: Public smoke test
        run: |
          URL="https://${SWARM_DOMAIN}/healthz"
          echo "Smoke testing: ${URL}"
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "${URL}" >/tmp/smoke.out 2>&1; then
              echo "✓ Smoke test passed"
              exit 0
            fi
            echo "  attempt ${i}/30 failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::Smoke test failed: ${URL}"
          cat /tmp/smoke.out || true
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          echo "### Deploy Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Stack**: \`${STACK_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image tag**: \`${{ needs.build.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Domain**: \`https://${SWARM_DOMAIN}\`" >> "$GITHUB_STEP_SUMMARY"
          NODE_COUNT=$(docker node ls -q | wc -l | tr -d ' ' || echo "?")
          echo "- **Swarm nodes**: \`${NODE_COUNT}\`" >> "$GITHUB_STEP_SUMMARY"
