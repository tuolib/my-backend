name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app

            git pull origin main

            echo "Checking active container..."

            ACTIVE=$(docker ps --filter "label=caddy=api.find345.site" --format "{{.Names}}")

            # ===== 首次部署 =====
            if [ -z "$ACTIVE" ]; then
              echo "🚀 First deployment"

              docker compose build api-blue
              docker compose up -d api-blue

              echo "Waiting for health..."

              CONTAINER_ID=$(docker compose ps -q api-blue)

              until docker inspect --format='{{.State.Health.Status}}' $CONTAINER_ID | grep -q "healthy"; do
                sleep 2
              done

              echo "✅ First deployment complete."
              exit 0
            fi

            # ===== 蓝绿切换 =====

            if [[ "$ACTIVE" == *"blue"* ]]; then
              NEW=api-green
              OLD=api-blue
            else
              NEW=api-blue
              OLD=api-green
            fi

            echo "Active: $OLD"
            echo "Deploying: $NEW"

            docker compose build $NEW
            docker compose up -d $NEW

            NEW_ID=$(docker compose ps -q $NEW)

            echo "Waiting for health..."
            until docker inspect --format='{{.State.Health.Status}}' $NEW_ID | grep -q "healthy"; do
              sleep 2
            done

            OLD_ID=$(docker compose ps -q $OLD)

            echo "Switching traffic..."

            docker container update \
              --label-add caddy=api.find345.site \
              --label-add caddy.reverse_proxy="{{upstreams 3000}}" \
              $NEW_ID

            docker container update \
              --label-rm caddy \
              --label-rm caddy.reverse_proxy \
              $OLD_ID

            docker exec $(docker compose ps -q caddy) caddy reload --config /etc/caddy/Caddyfile

            echo "Stopping old version..."
            docker compose stop $OLD

            echo "✅ Zero-downtime deployment complete."