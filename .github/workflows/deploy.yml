name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app
            
            # 1. 更新代码
            git pull origin main
            
            # 2. 备份
            mkdir -p backups
            docker exec postgres-db pg_dump -U user mydb > ./backups/backup_$(date +%Y%m%d_%H%M%S).sql || echo "Backup skipped"
            find ./backups -name "*.sql" -mtime +7 -delete
            
            # 3. 构建镜像（不启动）
            docker compose build
            
            # 4. 数据库 运行迁移（临时容器）
            # docker compose run --rm api bun run src/index.ts --migrate-only
            docker compose run --rm api bun run migrate
            # 回滚：docker compose run --rm api bun run migrate:down
            
            # 5. 启动服务
            docker compose up -d --remove-orphans
            
            echo "✅ Deployment successful."