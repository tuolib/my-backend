# CI/CD — 微服务构建 & K8s/K3s 自动部署
#
# push to main / workflow_dispatch → 类型检查 → 构建 5 个镜像 → SSH 部署到 K8s/K3s → 健康检查
# PR to main                       → 类型检查 → 构建（不推送、不部署）
#
# platform 选择: push/PR 默认 k8s, workflow_dispatch 可选 k8s 或 k3s

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "目标平台"
        required: true
        type: choice
        default: "k8s"
        options:
          - k8s
          - k3s
      image_tag:
        description: "Custom image tag (leave blank = SHA)"
        required: false
        default: ""

# 同分支只保留最后一次运行（按平台隔离）
concurrency:
  group: deploy-${{ inputs.platform || 'k8s' }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PLATFORM: ${{ inputs.platform || 'k8s' }}
  DOMAIN: api.find345.site

# ─── Jobs ────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Job ① 类型检查 ──────────────────────────────────────────────────────────
  check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ─── Job ② 并行构建 5 个微服务镜像 ──────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service.name }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER_LC}/ecom-${{ matrix.service.name }}"
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Build summary
        run: |
          echo "### ${{ matrix.service.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pushed**: \`${{ github.event_name != 'pull_request' }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Job ③ SSH 到 K8s/K3s 节点，Helm 部署 ──────────────────────────────────
  deploy:
    name: Deploy to ${{ inputs.platform || 'k8s' }}
    needs: build-images
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag and platform config
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # 根据平台选择 SSH 目标和 values 文件
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == "k3s" ]]; then
            echo "values_flag=-f /opt/ecom/infra/k8s/ecom-chart/values-k3s.yaml" >> "$GITHUB_OUTPUT"
            echo "kubeconfig_export=export KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "values_flag=" >> "$GITHUB_OUTPUT"
            echo "kubeconfig_export=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (Helm Chart only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra/k8s

      - name: Copy Helm Chart to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_HOST || secrets.K8S_SSH_HOST }}
          username: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_USER || secrets.K8S_SSH_USER }}
          key: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_KEY || secrets.K8S_SSH_KEY }}
          source: "infra/k8s/ecom-chart/"
          target: /opt/ecom

      - name: Helm deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_HOST || secrets.K8S_SSH_HOST }}
          username: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_USER || secrets.K8S_SSH_USER }}
          key: ${{ env.PLATFORM == 'k3s' && secrets.K3S_SSH_KEY || secrets.K8S_SSH_KEY }}
          script: |
            set -euo pipefail

            # k3s 需要指定 KUBECONFIG
            ${{ steps.vars.outputs.kubeconfig_export }}

            REGISTRY="${{ steps.vars.outputs.registry }}"
            TAG="${{ steps.vars.outputs.tag }}"
            NAMESPACE="ecom"
            RELEASE="ecom"
            CHART="/opt/ecom/infra/k8s/ecom-chart"
            PLATFORM="${{ env.PLATFORM }}"

            echo "══════════════════════════════════════════"
            echo "Deploying ${RELEASE} to ${PLATFORM} (tag: ${TAG})"
            echo "══════════════════════════════════════════"

            # 确保 namespace 存在
            kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

            # 创建/更新 GHCR 拉镜像凭证（私有仓库需要）
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace="${NAMESPACE}" \
              --docker-server=ghcr.io \
              --docker-username="${{ github.actor }}" \
              --docker-password="${{ secrets.GHCR_PAT }}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # 根据平台选择 secrets（K8S_ 或 K3S_ 前缀）
            if [[ "${PLATFORM}" == "k3s" ]]; then
              PG_PASS="${{ secrets.K3S_POSTGRES_PASSWORD }}"
              REPL_PASS="${{ secrets.K3S_REPLICATION_PASSWORD }}"
              JWT_ACCESS="${{ secrets.K3S_JWT_ACCESS_SECRET }}"
              JWT_REFRESH="${{ secrets.K3S_JWT_REFRESH_SECRET }}"
              INTERNAL="${{ secrets.K3S_INTERNAL_SECRET }}"
            else
              PG_PASS="${{ secrets.K8S_POSTGRES_PASSWORD }}"
              REPL_PASS="${{ secrets.K8S_REPLICATION_PASSWORD }}"
              JWT_ACCESS="${{ secrets.K8S_JWT_ACCESS_SECRET }}"
              JWT_REFRESH="${{ secrets.K8S_JWT_REFRESH_SECRET }}"
              INTERNAL="${{ secrets.K8S_INTERNAL_SECRET }}"
            fi

            # Helm 部署/升级
            helm upgrade --install "${RELEASE}" "${CHART}" \
              --namespace "${NAMESPACE}" \
              ${{ steps.vars.outputs.values_flag }} \
              --set "global.registry=${REGISTRY}" \
              --set "global.imageTag=${TAG}" \
              --set "global.imagePullSecrets[0]=ghcr-pull-secret" \
              --set "secrets.postgresPassword=${PG_PASS}" \
              --set "secrets.replicationPassword=${REPL_PASS}" \
              --set "secrets.jwtAccessSecret=${JWT_ACCESS}" \
              --set "secrets.jwtRefreshSecret=${JWT_REFRESH}" \
              --set "secrets.internalSecret=${INTERNAL}" \
              --wait \
              --timeout 300s

            echo ""
            echo "══════════ Pod Status ══════════"
            kubectl get pods -n "${NAMESPACE}" -o wide

            echo ""
            echo "══════════ Services ══════════"
            kubectl get svc -n "${NAMESPACE}"

            echo ""
            echo "══════════ Helm Release ══════════"
            helm list -n "${NAMESPACE}"

  # ─── Job ④ 外部健康检查 ─────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: deploy
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          URL="https://${{ env.DOMAIN }}/health"
          echo "Smoke testing: ${URL}"

          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              --max-time 10 \
              -X POST "${URL}" 2>/dev/null) || HTTP_CODE="000"

            if [ "${HTTP_CODE}" = "200" ]; then
              echo "✓ Health check passed (attempt ${i}/20)"
              cat /tmp/health.json
              exit 0
            fi

            echo "  attempt ${i}/20 — HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 20 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == "k3s" ]]; then
            PLATFORM_LABEL="K3s (Helm)"
          else
            PLATFORM_LABEL="Kubernetes (Helm)"
          fi

          echo "## ${PLATFORM_LABEL} Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::12}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Domain** | [https://${{ env.DOMAIN }}](https://${{ env.DOMAIN }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platform** | ${PLATFORM_LABEL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${GITHUB_EVENT_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${GITHUB_ACTOR}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Services" >> "$GITHUB_STEP_SUMMARY"
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          for SVC in api-gateway user-service product-service cart-service order-service; do
            echo "- \`ghcr.io/${OWNER_LC}/ecom-${SVC}:${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done
