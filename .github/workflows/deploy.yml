name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app
            
            # 1. 自动备份逻辑 (在更新前执行)
            echo "Starting database backup..."
            mkdir -p backups
            DB_CONTAINER=$(docker ps --filter "name=db" --format "{{.Names}}")
            docker exec $DB_CONTAINER pg_dump -U user mydb > ./backups/backup_$(date +%Y%m%d_%H%M%S).sql
            find ./backups -name "*.sql" -mtime +7 -delete
            
            git pull origin main
            
            # 3. 构建生产镜像 (关键：确保使用了生产环境配置)
            echo "Building production images..."
            docker compose build api
            
            # 先启动 db 和 redis（后台）
            docker compose up -d db redis
            
            # 等待几秒确保数据库就绪
            sleep 5
            
            # --- NEW: 显式运行数据库迁移 ---
            # 启动一个临时的 Docker 容器，只运行迁移脚本，然后退出
            # 确保你的 docker-compose.yml 中有一个名为 'backend' 的服务
            echo "Running database migrations..."
            docker compose run --rm api bun run src/index.ts --migrate-only
            
            # 检查迁移是否成功
            if [ $? -ne 0 ]; then
              echo "❌ Database migrations failed! Aborting deployment."
              exit 1
            fi
            echo "✅ Database migrations completed successfully."
            # --- END NEW ---
            
            # 6. 滚动更新应用
            echo "Updating application..."
            docker compose up -d --remove-orphans
            
            # 7. 清理旧镜像 (释放磁盘空间)
            docker image prune -f
            # 启动/更新主应用程序服务
            # echo "Starting/Updating main application services..."
            # docker compose up --build -d
            
            echo "Deployment successful."