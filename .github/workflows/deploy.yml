name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app
            
            # 1. 更新代码
            git pull origin main
            
            # 2. 备份（容错处理：如果 db 还没起来就跳过备份）
            echo "Starting backup..."
            mkdir -p backups
            docker exec postgres-db pg_dump -U user mydb > ./backups/backup_$(date +%Y%m%d_%H%M%S).sql || echo "Backup skipped (db not running)"
            find ./backups -name "*.sql" -mtime +7 -delete
            
            # 3. 构建并启动
            # --build 会重新构建镜像
            # --remove-orphans 会清理掉没用的容器
            docker compose up -d --build --remove-orphans
            
            # 4. 执行迁移 (容器起来后执行)
            echo "Running migrations..."
            # 既然是单实例，直接在运行中的容器里执行迁移更省事
            docker exec api-service bun run src/index.ts --migrate-only
            
            echo "✅ Deployment successful."