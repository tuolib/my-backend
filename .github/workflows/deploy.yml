# CI/CD — 微服务构建 & 自动部署
#
# 触发方式:
#   1. push 到 main → 自动部署到 k3s-multi
#   2. 手动触发 workflow_dispatch → 可选平台

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "目标平台"
        required: true
        type: choice
        default: "k3s-multi"
        options:
          - swarm
          - k8s
          - k3s-single
          - k3s-multi
      image_tag:
        description: "Custom image tag (leave blank = SHA)"
        required: false
        default: ""

# 同分支只保留最后一次运行
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PLATFORM: ${{ inputs.platform || 'k3s-multi' }}
  DOMAIN: api.find345.site

# ─── Jobs ────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Job ① 类型检查 ──────────────────────────────────────────────────────────
  check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ─── Job ② 并行构建 5 个微服务镜像 ──────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service.name }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile
          - name: patroni
            dockerfile: infra/swarm/Dockerfile.patroni

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER_LC}/ecom-${{ matrix.service.name }}"
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Build summary
        run: |
          echo "### ${{ matrix.service.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pushed**: \`${{ github.event_name != 'pull_request' }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Job ③a SSH 部署到 Docker Swarm ─────────────────────────────────────────
  deploy-swarm:
    name: Deploy to Swarm
    needs: build-images
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.platform == 'swarm'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout (for stack file)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra

      - name: Copy stack configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SWARM_HOST }}
          username: ${{ vars.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "infra/"
          target: /opt/ecom

      - name: Create secrets & deploy stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SWARM_HOST }}
          username: ${{ vars.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ steps.vars.outputs.registry }}"
            TAG="${{ steps.vars.outputs.tag }}"
            STACK="ecom"
            SERVICES="api-gateway user-service product-service cart-service order-service"

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # ── 1. 节点标签（幂等，按 Node ID 分配，hostname 重复也安全） ──
            echo "══════════ Node Labels ══════════"
            SELF_ID=$(docker node inspect self --format '{{.ID}}')
            OTHER_MGR_IDS=$(docker node ls --filter "role=manager" --format '{{.ID}}' | grep -v "^${SELF_ID}$" | sort)

            NODE_DB_PRIMARY="${SELF_ID}"
            NODE_DB_REPLICA=$(echo "${OTHER_MGR_IDS}" | sed -n '1p')
            NODE_GATEWAY=$(echo "${OTHER_MGR_IDS}" | sed -n '2p')

            for pair in "db-primary:${NODE_DB_PRIMARY}" "db-replica:${NODE_DB_REPLICA}" "gateway:${NODE_GATEWAY}"; do
              ROLE="${pair%%:*}"; NID="${pair#*:}"
              if [ -n "${NID}" ]; then
                HNAME=$(docker node inspect --format '{{.Description.Hostname}}' "${NID}" 2>/dev/null || echo "${NID}")
                docker node update --label-add role="${ROLE}" "${NID}" >/dev/null 2>&1
                echo "  ${HNAME} (${NID:0:12}) → ${ROLE}"
              fi
            done

            # ── 2. Docker Secrets（幂等，已存在则跳过） ──
            create_secret() {
              if docker secret inspect "$1" >/dev/null 2>&1; then
                echo "  $1 exists"
              else
                echo -n "$2" | docker secret create "$1" -
                echo "  $1 created"
              fi
            }
            echo "══════════ Secrets ══════════"
            create_secret postgres_password   "${{ secrets.SWARM_POSTGRES_PASSWORD }}"
            create_secret jwt_access_secret   "${{ secrets.SWARM_JWT_ACCESS_SECRET }}"
            create_secret jwt_refresh_secret  "${{ secrets.SWARM_JWT_REFRESH_SECRET }}"
            create_secret internal_secret     "${{ secrets.SWARM_INTERNAL_SECRET }}"

            # ── 3. Deploy / Update ──
            if ! docker service inspect "${STACK}_api-gateway" >/dev/null 2>&1; then
              echo ""
              echo "══════════ Initial Deployment ══════════"

              # 清理旧 stack（释放端口）
              OLD_STACK=$(docker stack ls --format '{{.Name}}' | grep -v "^${STACK}$" | head -1 || true)
              if [ -n "${OLD_STACK}" ]; then
                echo "Removing old stack: ${OLD_STACK}"
                docker stack rm "${OLD_STACK}"
                TIMEOUT=60; ELAPSED=0
                while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
                  [ "$(docker service ls --filter "name=${OLD_STACK}_" -q 2>/dev/null | wc -l)" -eq 0 ] && break
                  sleep 5; ELAPSED=$((ELAPSED + 5))
                done
              fi

              cd /opt/ecom/infra/swarm
              REGISTRY="${REGISTRY}" TAG="${TAG}" \
                CERTBOT_DOMAIN="${{ vars.CERTBOT_DOMAIN || 'api.find345.site' }}" \
                CERTBOT_EMAIL="${{ vars.CERTBOT_EMAIL || 'admin@find345.site' }}" \
                CORS_ORIGINS="${{ vars.CORS_ORIGINS || '' }}" \
                docker stack deploy -c docker-stack.yml --with-registry-auth "${STACK}"
            else
              echo ""
              echo "══════════ Rolling Update ══════════"

              # 先 re-deploy stack（拾取配置变更：nginx.conf、entrypoint 等）
              cd /opt/ecom/infra/swarm
              REGISTRY="${REGISTRY}" TAG="${TAG}" \
                CERTBOT_DOMAIN="${{ vars.CERTBOT_DOMAIN || 'api.find345.site' }}" \
                CERTBOT_EMAIL="${{ vars.CERTBOT_EMAIL || 'admin@find345.site' }}" \
                CORS_ORIGINS="${{ vars.CORS_ORIGINS || '' }}" \
                docker stack deploy -c docker-stack.yml --with-registry-auth "${STACK}"

              # 更新 Patroni 镜像（两个节点共用同一镜像）
              PATRONI_IMAGE="${REGISTRY}/ecom-patroni:${TAG}"
              for P in patroni-1 patroni-2; do
                echo "Updating ${STACK}_${P} → ${PATRONI_IMAGE}"
                docker service update --with-registry-auth --image "${PATRONI_IMAGE}" "${STACK}_${P}" || true
              done

              # 逐个滚动更新应用镜像
              for SVC in ${SERVICES}; do
                IMAGE="${REGISTRY}/ecom-${SVC}:${TAG}"
                echo "Updating ${STACK}_${SVC} → ${IMAGE}"
                docker service update --with-registry-auth --image "${IMAGE}" "${STACK}_${SVC}"

                TIMEOUT=180; ELAPSED=0
                while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
                  STATE=$(docker service inspect --format '{{.UpdateStatus.State}}' "${STACK}_${SVC}" 2>/dev/null || echo "unknown")
                  case "${STATE}" in
                    completed)          echo "  ${SVC} done"; break ;;
                    rollback_completed) echo "  ${SVC} rolled back!"; exit 1 ;;
                    paused)             echo "  ${SVC} paused!"; exit 1 ;;
                    *)                  sleep 5; ELAPSED=$((ELAPSED + 5)) ;;
                  esac
                done
                [ ${ELAPSED} -ge ${TIMEOUT} ] && { echo "${SVC} timeout"; exit 1; }
              done
            fi

            # ── 4. 等待所有服务就绪 ──
            echo ""
            echo "══════════ Waiting for convergence ══════════"
            TIMEOUT=180; ELAPSED=0
            while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
              NOT_READY=$(docker stack services "${STACK}" --format '{{.Replicas}}' \
                | awk -F'/' '$1 != $2 { n++ } END { print n+0 }')
              [ "${NOT_READY}" -eq 0 ] && break
              sleep 5; ELAPSED=$((ELAPSED + 5))
            done
            docker stack services "${STACK}"

            # ── 5. Schema 迁移 + Data 迁移 + Seed ──
            echo ""
            echo "══════════ Schema Migration ══════════"
            GW_ID=$(docker ps -q --filter "name=${STACK}_api-gateway" --filter "status=running" | head -1)
            if [ -n "${GW_ID}" ]; then
              docker exec "${GW_ID}" /app-entrypoint.sh \
                bun run packages/database/src/migrate.ts \
                || echo "::warning::Schema migration failed (may already be up to date)"
            else
              echo "::warning::api-gateway not running, skipping schema migration"
            fi

            echo ""
            echo "══════════ Data Migration ══════════"
            PS_ID=$(docker ps -q --filter "name=${STACK}_product-service" --filter "status=running" | head -1)
            if [ -n "${PS_ID}" ]; then
              docker exec "${PS_ID}" /app-entrypoint.sh \
                bun run packages/database/src/data-migrate.ts \
                || echo "::warning::Data migration failed (may already be up to date)"

              echo ""
              echo "══════════ Production Seed (idempotent) ══════════"
              docker exec "${PS_ID}" /app-entrypoint.sh \
                bun run packages/database/src/seed-prod.ts \
                || echo "::warning::Production seed failed"
            else
              echo "::warning::product-service not running, skipping data migration & seed"
            fi

            echo ""
            echo "All done."
            docker service ls --filter "name=${STACK}_"

  # ─── Job ③b Kubeconfig 直连 K8s/K3s API Server，Helm 部署 ──────────────────
  deploy-k8s:
    name: Deploy to ${{ inputs.platform || 'k3s-multi' }}
    needs: build-images
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.platform, 'k'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag and platform config
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # 根据平台选择 values 文件
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == "k3s-multi" ]]; then
            echo "values_flag=-f infra/k3s/values-multi.yaml" >> "$GITHUB_OUTPUT"
          elif [[ "${PLATFORM}" == "k3s-single" ]]; then
            echo "values_flag=-f infra/k3s/values.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "values_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (Helm Chart + values)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra/charts
            infra/k3s

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == k3s* ]]; then
            echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          else
            echo "${{ secrets.K8S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          fi
          chmod 600 "${HOME}/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Create namespace
        run: kubectl create namespace ecom --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace=ecom \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build Helm dependencies
        run: helm dependency build infra/charts/ecom-chart

      - name: Lint Helm chart
        run: helm lint infra/charts/ecom-chart ${{ steps.vars.outputs.values_flag }}

      - name: Helm deploy
        run: |
          set -euo pipefail

          REGISTRY="${{ steps.vars.outputs.registry }}"
          TAG="${{ steps.vars.outputs.tag }}"
          NAMESPACE="ecom"
          RELEASE="ecom"
          CHART="infra/charts/ecom-chart"
          PLATFORM="${{ env.PLATFORM }}"
          HELM_EXTRA_ARGS=()

          echo "══════════════════════════════════════════"
          echo "Deploying ${RELEASE} to ${PLATFORM} (tag: ${TAG})"
          echo "══════════════════════════════════════════"

          ensure_ingress_webhook_fail_open() {
            if [[ "${PLATFORM}" != k3s* ]]; then
              return 0
            fi

            # 在当前 k3s 网络形态下，apiserver -> ingress admission webhook 不可达会导致所有 Ingress 变更超时
            # 直接删除该 ValidatingWebhookConfiguration，确保 Helm 部署不被卡住
            echo "Deleting ingress-nginx admission webhook configuration on k3s..."
            kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true
          }

          dump_debug_state() {
            echo "══════════ DEBUG: pods ══════════"
            kubectl get pods -n "${NAMESPACE}" -o wide || true
            echo ""
            echo "══════════ DEBUG: deployments ══════════"
            kubectl get deploy -n "${NAMESPACE}" || true
            echo ""
            echo "══════════ DEBUG: events (tail 50) ══════════"
            kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -n 50 || true
            echo ""
            echo "══════════ DEBUG: cnpg clusters ══════════"
            kubectl get cluster -n "${NAMESPACE}" 2>/dev/null || true
            echo ""
            echo "══════════ DEBUG: cert-manager ══════════"
            kubectl get clusterissuer 2>/dev/null || true
          }

          preflight_all() {
            echo "Running all preflight checks in parallel..."
            local PIDS=() NAMES=() FAILS=0

            kubectl get nodes -o wide

            kubectl wait --for=condition=Ready node --all --timeout=30s &
            PIDS+=($!); NAMES+=("nodes")

            kubectl -n kube-system rollout status deployment/coredns --timeout=30s &
            PIDS+=($!); NAMES+=("coredns")

            kubectl -n cnpg-system rollout status deployment/cnpg-controller-manager --timeout=30s &
            PIDS+=($!); NAMES+=("cnpg")

            if kubectl -n redis-operator-system get deployment redis-operator >/dev/null 2>&1; then
              kubectl -n redis-operator-system rollout status deployment/redis-operator --timeout=30s &
              PIDS+=($!); NAMES+=("redis-operator")
            fi

            if [[ "${PLATFORM}" == k3s* ]]; then
              if kubectl -n ingress-nginx get daemonset ingress-nginx-controller >/dev/null 2>&1; then
                kubectl -n ingress-nginx rollout status daemonset/ingress-nginx-controller --timeout=30s &
                PIDS+=($!); NAMES+=("ingress-nginx")
              elif kubectl -n ingress-nginx get deployment ingress-nginx-controller >/dev/null 2>&1; then
                kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=30s &
                PIDS+=($!); NAMES+=("ingress-nginx")
              else
                echo "::error::ingress-nginx controller not found"
                return 1
              fi
            fi

            for i in "${!PIDS[@]}"; do
              if wait ${PIDS[$i]}; then
                echo "  ✓ ${NAMES[$i]} ready"
              else
                echo "::error::${NAMES[$i]} not ready"
                FAILS=$((FAILS + 1))
              fi
            done

            if [ ${FAILS} -gt 0 ]; then
              echo "::error::${FAILS} preflight check(s) failed"
              return 1
            fi
            echo "All preflight checks passed."
          }

          # 智能部署监控：检测终态错误立即终止 Helm（仅检测新增失败 Pod，忽略部署前已存在的）
          monitor_helm_deploy() {
            local HELM_PID=$1
            local PRE_EXISTING="$2"  # 部署前已失败的 Pod 列表（换行分隔）
            while kill -0 ${HELM_PID} 2>/dev/null; do
              echo "---- deploy progress $(date -u +'%Y-%m-%dT%H:%M:%SZ') ----"
              kubectl get pods -n "${NAMESPACE}" --no-headers 2>/dev/null | awk '{print $1, $2, $3}' || true
              kubectl get deploy -n "${NAMESPACE}" --no-headers 2>/dev/null | awk '{print $1, "ready=" $2, "up-to-date=" $3, "available=" $4}' || true

              # 检测 Pod 终态错误 → 过滤掉部署前已存在的 + Init 容器重试（Init:CrashLoopBackOff 是正常重试）
              ALL_FAILED=$(kubectl get pods -n "${NAMESPACE}" --no-headers 2>/dev/null \
                | awk '$3 ~ /ImagePullBackOff|ErrImagePull|InvalidImageName|CreateContainerConfigError/ || $3 == "CrashLoopBackOff" {print $1, $3}' || true)
              NEW_FAILED=""
              if [[ -n "${ALL_FAILED}" ]]; then
                while IFS= read -r LINE; do
                  POD_NAME=$(echo "${LINE}" | awk '{print $1}')
                  if ! echo "${PRE_EXISTING}" | grep -qxF "${POD_NAME}"; then
                    NEW_FAILED="${NEW_FAILED}${LINE}"$'\n'
                  fi
                done <<< "${ALL_FAILED}"
              fi
              NEW_FAILED=$(echo -n "${NEW_FAILED}" | sed '/^$/d')
              if [[ -n "${NEW_FAILED}" ]]; then
                echo "::error::Pod terminal failure detected (new pods only):"
                echo "${NEW_FAILED}"
                for POD in $(echo "${NEW_FAILED}" | awk '{print $1}'); do
                  echo "--- ${POD} events ---"
                  kubectl get events -n "${NAMESPACE}" --field-selector involvedObject.name="${POD}" --sort-by=.lastTimestamp 2>/dev/null | tail -5 || true
                done
                kill ${HELM_PID} 2>/dev/null || true
                return 1
              fi

              sleep 5
            done
            return 0
          }

          # 清理卡住的 pending 状态 release（上次部署失败残留）
          STATUS=$(helm status "${RELEASE}" -n "${NAMESPACE}" -o json 2>/dev/null | jq -r '.info.status // empty' || true)
          if [[ "${STATUS}" == "pending-install" ]]; then
            echo "检测到 pending-install 状态，删除残留 release..."
            helm uninstall "${RELEASE}" -n "${NAMESPACE}" --no-hooks || true
            # uninstall 可能连带删除 namespace，重新创建
            kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          elif [[ "${STATUS}" == "pending-upgrade" || "${STATUS}" == "pending-rollback" ]]; then
            echo "检测到 ${STATUS} 状态，回滚到上一个稳定版本..."
            helm rollback "${RELEASE}" 0 -n "${NAMESPACE}" --no-hooks || true
          fi

          # 根据平台选择 secrets（K8S_ 或 K3S_ 前缀）
          if [[ "${PLATFORM}" == k3s* ]]; then
            PG_PASS="${{ secrets.K3S_POSTGRES_PASSWORD }}"
            REPL_PASS="${{ secrets.K3S_REPLICATION_PASSWORD }}"
            JWT_ACCESS="${{ secrets.K3S_JWT_ACCESS_SECRET }}"
            JWT_REFRESH="${{ secrets.K3S_JWT_REFRESH_SECRET }}"
            INTERNAL="${{ secrets.K3S_INTERNAL_SECRET }}"
          else
            PG_PASS="${{ secrets.K8S_POSTGRES_PASSWORD }}"
            REPL_PASS="${{ secrets.K8S_REPLICATION_PASSWORD }}"
            JWT_ACCESS="${{ secrets.K8S_JWT_ACCESS_SECRET }}"
            JWT_REFRESH="${{ secrets.K8S_JWT_REFRESH_SECRET }}"
            INTERNAL="${{ secrets.K8S_INTERNAL_SECRET }}"
          fi

          # 若集群已有 CNPG 超级用户密码，优先使用其值，避免与仓库 Secret 漂移
          PG_SECRET_NAME="${RELEASE}-pg-superuser"
          if kubectl -n "${NAMESPACE}" get secret "${PG_SECRET_NAME}" >/dev/null 2>&1; then
            PG_PASS_CLUSTER="$(kubectl -n "${NAMESPACE}" get secret "${PG_SECRET_NAME}" -o jsonpath='{.data.password}' | base64 -d)"
            if [[ -n "${PG_PASS_CLUSTER}" ]]; then
              PG_PASS="${PG_PASS_CLUSTER}"
              echo "Using PostgreSQL password from cluster secret: ${PG_SECRET_NAME}"
            fi
          fi

          preflight_all
          ensure_ingress_webhook_fail_open

          # Clean up cert-manager resources to avoid Ingress field ownership conflicts with Helm
          # Must delete Certificate too, otherwise cert-manager immediately recreates challenges
          if kubectl get challenge -n "${NAMESPACE}" --no-headers 2>/dev/null | grep -q .; then
            echo "Detected in-flight ACME challenge, cleaning up cert-manager resources..."
            kubectl delete certificate -n "${NAMESPACE}" --all --ignore-not-found=true 2>/dev/null || true
            kubectl delete order -n "${NAMESPACE}" --all --ignore-not-found=true 2>/dev/null || true
            kubectl delete challenge -n "${NAMESPACE}" --all --ignore-not-found=true 2>/dev/null || true
          fi

          # ── 同步 PG 密码：Secret → PostgreSQL（解决初始 bootstrap 密码漂移） ──
          PG_SECRET_NAME="${RELEASE}-pg-superuser"
          PG_RW_HOST="${RELEASE}-pg-rw"
          PG_PRIMARY="${RELEASE}-pg-1"

          if kubectl -n "${NAMESPACE}" get pod "${PG_PRIMARY}" >/dev/null 2>&1; then
            echo "══════════ Syncing postgres password from Secret to PostgreSQL ══════════"
            # 构造 ALTER USER SQL，通过 stdin 管道传入 psql，避免所有 shell 转义问题
            # base64 -d 在 CI runner 解码 → sed 转义 SQL 单引号 → psql 在 PG pod 内执行
            (
              printf "ALTER USER postgres PASSWORD '"
              kubectl get secret -n "${NAMESPACE}" "${PG_SECRET_NAME}" \
                -o jsonpath='{.data.password}' | base64 -d | sed "s/'/''/g"
              printf "';\n"
            ) | kubectl exec -i -n "${NAMESPACE}" "${PG_PRIMARY}" -c postgres -- psql -U postgres 2>&1 || true
            echo "Password sync done."
          fi

          HELM_MAX_RETRIES=3
          HELM_ATTEMPT=1
          while [ ${HELM_ATTEMPT} -le ${HELM_MAX_RETRIES} ]; do
            echo "Helm upgrade attempt ${HELM_ATTEMPT}/${HELM_MAX_RETRIES}"

            # 快照部署前已存在的失败 Pod（避免误判旧 Pod 为本次部署失败）
            PRE_FAIL_PODS=$(kubectl get pods -n "${NAMESPACE}" --no-headers 2>/dev/null \
              | awk '$3 ~ /ImagePullBackOff|ErrImagePull|InvalidImageName|CreateContainerConfigError/ || $3 == "CrashLoopBackOff" {print $1}' || true)
            if [[ -n "${PRE_FAIL_PODS}" ]]; then
              echo "Pre-existing failed pods (will be ignored by monitor):"
              echo "${PRE_FAIL_PODS}"
            fi

            set +e
            # Helm 后台运行，前台智能监控
            helm upgrade --install "${RELEASE}" "${CHART}" \
              --namespace "${NAMESPACE}" \
              --create-namespace \
              ${{ steps.vars.outputs.values_flag }} \
              --set "global.registry=${REGISTRY}" \
              --set "global.imageTag=${TAG}" \
              --set "global.imagePullSecrets[0]=ghcr-pull-secret" \
              --set-string "secrets.postgresPassword=${PG_PASS}" \
              --set-string "secrets.replicationPassword=${REPL_PASS}" \
              --set-string "secrets.jwtAccessSecret=${JWT_ACCESS}" \
              --set-string "secrets.jwtRefreshSecret=${JWT_REFRESH}" \
              --set-string "secrets.internalSecret=${INTERNAL}" \
              "${HELM_EXTRA_ARGS[@]}" \
              --wait \
              --timeout 180s > /tmp/helm-output.log 2>&1 &
            HELM_PID=$!

            MONITOR_FAIL=""
            monitor_helm_deploy ${HELM_PID} "${PRE_FAIL_PODS}" || MONITOR_FAIL="true"

            wait ${HELM_PID} 2>/dev/null
            HELM_EXIT=$?
            HELM_OUTPUT=$(cat /tmp/helm-output.log 2>/dev/null || true)
            set -e

            echo "${HELM_OUTPUT}"

            if [[ -n "${MONITOR_FAIL}" ]]; then
              echo "::error::Deploy terminated: pod terminal failure detected"
              dump_debug_state
              exit 1
            fi

            if [ ${HELM_EXIT} -eq 0 ]; then
              echo "Helm deploy succeeded."
              break
            fi

            if echo "${HELM_OUTPUT}" | grep -q 'validate.nginx.ingress.kubernetes.io'; then
              if [ ${HELM_ATTEMPT} -lt ${HELM_MAX_RETRIES} ]; then
                echo "Detected ingress admission webhook timeout, deleting webhook and retrying..."
                ensure_ingress_webhook_fail_open
                sleep 2
                HELM_ATTEMPT=$((HELM_ATTEMPT + 1))
                continue
              fi
            fi

            echo "::error::Helm deploy failed"
            dump_debug_state
            exit ${HELM_EXIT}
          done

          # ── 数据库迁移：绕过 DNS，用 ClusterIP 直连 PG ──
          PG_SVC="${RELEASE}-pg-rw"
          PG_IP=$(kubectl get svc -n "${NAMESPACE}" "${PG_SVC}" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
          PG_PASS=$(kubectl get secret -n "${NAMESPACE}" "${RELEASE}-pg-superuser" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)

          if [[ -n "${PG_IP}" && -n "${PG_PASS}" ]]; then
            REDIS_SVC=$(kubectl get svc -n "${NAMESPACE}" -l app.kubernetes.io/name=redis -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "${RELEASE}-redis")
            REDIS_IP=$(kubectl get svc -n "${NAMESPACE}" "${REDIS_SVC}" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)

            echo "Running schema migration (PG ClusterIP: ${PG_IP})..."
            kubectl exec -n "${NAMESPACE}" deploy/${RELEASE}-api-gateway -c api-gateway -- \
              env PGHOST="${PG_IP}" PGPORT=5432 PGDATABASE=ecommerce PGUSER=postgres PGPASSWORD="${PG_PASS}" \
              bun run packages/database/src/migrate.ts 2>&1 || echo "::warning::Schema migration failed (may already be up to date)"

            echo "Running data migration..."
            kubectl exec -n "${NAMESPACE}" deploy/${RELEASE}-product-service -c product-service -- \
              env \
                NODE_ENV=production \
                DATABASE_URL="postgresql://postgres:${PG_PASS}@${PG_IP}:5432/ecommerce" \
                REDIS_URL="redis://${REDIS_IP:-${RELEASE}-redis}:6379" \
                JWT_ACCESS_SECRET=unused \
                JWT_REFRESH_SECRET=unused \
              bun run packages/database/src/data-migrate.ts 2>&1 || echo "::warning::Data migration failed (may already be up to date)"

            echo "Running production seed (idempotent)..."
            kubectl exec -n "${NAMESPACE}" deploy/${RELEASE}-product-service -c product-service -- \
              env \
                NODE_ENV=production \
                DATABASE_URL="postgresql://postgres:${PG_PASS}@${PG_IP}:5432/ecommerce" \
                REDIS_URL="redis://${REDIS_IP:-${RELEASE}-redis}:6379" \
                JWT_ACCESS_SECRET=unused \
                JWT_REFRESH_SECRET=unused \
              bun run packages/database/src/seed-prod.ts 2>&1 || echo "::warning::Production seed failed"
          else
            echo "::warning::PG service or secret not found, skipping migration"
          fi

      - name: Verify deployment
        if: always()
        run: |
          echo "══════════ Pod Status ══════════"
          kubectl get pods -n ecom -o wide

          echo ""
          echo "══════════ Services ══════════"
          kubectl get svc -n ecom

          echo ""
          echo "══════════ Helm Release ══════════"
          helm list -n ecom

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "${HOME}/.kube/config"

  # ─── Job ④ 外部健康检查 ─────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: [deploy-swarm, deploy-k8s]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (needs.deploy-swarm.result == 'success' || needs.deploy-k8s.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          URL="https://${{ env.DOMAIN }}/health"
          echo "Smoke testing: ${URL}"

          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              --max-time 5 \
              -X POST "${URL}" 2>/dev/null) || HTTP_CODE="000"

            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Health check passed (attempt ${i}/10)"
              cat /tmp/health.json
              exit 0
            fi

            echo "  attempt ${i}/10 — HTTP ${HTTP_CODE}, retrying in 3s..."
            sleep 3
          done

          echo "::error::Health check failed after 10 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Write kubeconfig for rollback
        if: failure() && startsWith(env.PLATFORM, 'k')
        run: |
          mkdir -p "${HOME}/.kube"
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == k3s* ]]; then
            echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          else
            echo "${{ secrets.K8S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          fi
          chmod 600 "${HOME}/.kube/config"

      - name: Setup Helm for rollback
        if: failure() && startsWith(env.PLATFORM, 'k')
        uses: azure/setup-helm@v4

      - name: Rollback Helm release
        if: failure() && startsWith(env.PLATFORM, 'k')
        run: |
          echo "::warning::Smoke test failed — rolling back Helm release"
          helm rollback ecom -n ecom --wait || echo "::error::Helm rollback failed"

      - name: Cleanup kubeconfig
        if: always() && startsWith(env.PLATFORM, 'k')
        run: rm -f "${HOME}/.kube/config"

      - name: Deploy summary
        if: always()
        run: |
          PLATFORM="${{ env.PLATFORM }}"
          case "${PLATFORM}" in
            swarm)      PLATFORM_LABEL="Docker Swarm" ;;
            k3s-single) PLATFORM_LABEL="K3s single (Helm)" ;;
            k3s-multi)  PLATFORM_LABEL="K3s multi (Helm)" ;;
            k8s)        PLATFORM_LABEL="Kubernetes (Helm)" ;;
            *)          PLATFORM_LABEL="${PLATFORM}" ;;
          esac

          echo "## ${PLATFORM_LABEL} Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::12}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Domain** | [https://${{ env.DOMAIN }}](https://${{ env.DOMAIN }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platform** | ${PLATFORM_LABEL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${GITHUB_EVENT_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${GITHUB_ACTOR}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Services" >> "$GITHUB_STEP_SUMMARY"
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          for SVC in api-gateway user-service product-service cart-service order-service; do
            echo "- \`ghcr.io/${OWNER_LC}/ecom-${SVC}:${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done
