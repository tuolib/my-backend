name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app
            
            # 1. 更新代码
            git pull origin main
            
            # 2. 备份
            mkdir -p backups
            docker exec postgres-db pg_dump -U user mydb > ./backups/backup_$(date +%Y%m%d_%H%M%S).sql || echo "Backup skipped"
            find ./backups -name "*.sql" -mtime +7 -delete
            
            # 3. 判断当前颜色并选择下一颜色
            BLUE_RUNNING=false
            GREEN_RUNNING=false
            if docker compose ps --status running --services | grep -q "^api-blue$"; then BLUE_RUNNING=true; fi
            if docker compose ps --status running --services | grep -q "^api-green$"; then GREEN_RUNNING=true; fi

            if [ "$BLUE_RUNNING" = true ] && [ "$GREEN_RUNNING" = true ]; then
              echo "❌ 检测到 api-blue 和 api-green 同时运行，终止部署避免流量混乱。"
              exit 1
            fi

            if [ "$BLUE_RUNNING" = true ]; then
              CURRENT_SERVICE=api-blue
              NEXT_SERVICE=api-green
            elif [ "$GREEN_RUNNING" = true ]; then
              CURRENT_SERVICE=api-green
              NEXT_SERVICE=api-blue
            else
              CURRENT_SERVICE=""
              NEXT_SERVICE=api-blue
            fi

            echo "Current service: ${CURRENT_SERVICE:-none}, next service: $NEXT_SERVICE"
            docker compose -f up stop
            # 4. 基础依赖服务先启动
            docker compose up -d db redis caddy

            # 5. 构建下一颜色镜像
            docker compose build "$NEXT_SERVICE"
            
            # 6. 运行迁移（使用下一颜色镜像）
            docker compose run --rm "$NEXT_SERVICE" bun run migrate
            # 回滚：docker compose run --rm "$NEXT_SERVICE" bun run migrate:down
            
            # 7. 启动下一颜色实例
            docker compose up -d --no-deps "$NEXT_SERVICE"

            # 8. 健康检查（最多等待 120 秒）
            NEXT_CONTAINER_ID=$(docker compose ps -q "$NEXT_SERVICE")
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$NEXT_CONTAINER_ID")
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                echo "✅ $NEXT_SERVICE is healthy."
                break
              fi

              if [ "$i" -eq 24 ]; then
                echo "❌ $NEXT_SERVICE health check timeout, rollback."
                docker compose stop "$NEXT_SERVICE" || true
                exit 1
              fi

              sleep 5
            done

            # 9. 下线旧颜色实例
            if [ -n "$CURRENT_SERVICE" ]; then
              docker compose stop "$CURRENT_SERVICE"
            fi

            # 10. 清理孤儿容器
            docker compose up -d --remove-orphans
            
            echo "✅ Blue-green deployment successful. Active: $NEXT_SERVICE"
