name: Build And Deploy K8s Blue-Green

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image vars
        id: vars
        run: |
          IMAGE_REPOSITORY="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="${GITHUB_SHA}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy blue/green
        env:
          NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          RELEASE: ${{ secrets.K8S_RELEASE_NAME }}
          VALUES_FILE: ${{ secrets.K8S_VALUES_FILE }}
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          API_ACTIVE_REPLICAS: ${{ secrets.K8S_API_ACTIVE_REPLICAS }}
          API_STANDBY_REPLICAS: ${{ secrets.K8S_API_STANDBY_REPLICAS }}
          RUN_MIGRATION: true
        run: |
          : "${NAMESPACE:=ho}"
          : "${RELEASE:=ho}"
          : "${VALUES_FILE:=./charts/ho-stack/values-prod.yaml}"
          : "${API_ACTIVE_REPLICAS:=4}"
          : "${API_STANDBY_REPLICAS:=1}"

          ./scripts/deploy/bluegreen-k8s.sh
