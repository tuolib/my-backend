# CI/CD — 微服务构建 & 多平台自动部署
#
# 支持 4 种部署平台:
#   swarm      — Docker Swarm（SSH + docker service update 滚动更新）
#   k8s        — Kubernetes（kubeconfig 直连 + Helm 部署）
#   k3s-single — K3s 单节点（kubeconfig 直连 + Helm 部署）
#   k3s-multi  — K3s 多节点 HA（kubeconfig 直连 + Helm 部署）
#
# 仅手动触发（workflow_dispatch）→ 选择平台 → 类型检查 → 构建 → 部署 → 健康检查

name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "目标平台"
        required: true
        type: choice
        default: "swarm"
        options:
          - swarm
          - k8s
          - k3s-single
          - k3s-multi
      image_tag:
        description: "Custom image tag (leave blank = SHA)"
        required: false
        default: ""

# 同分支只保留最后一次运行（按平台隔离）
concurrency:
  group: deploy-${{ inputs.platform || 'swarm' }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PLATFORM: ${{ inputs.platform || 'swarm' }}
  DOMAIN: api.find345.site

# ─── Jobs ────────────────────────────────────────────────────────────────────────

jobs:
  # ─── Job ① 类型检查 ──────────────────────────────────────────────────────────
  check:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ─── Job ② 并行构建 5 个微服务镜像 ──────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service.name }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: true
      matrix:
        service:
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - name: user-service
            dockerfile: services/user-service/Dockerfile
          - name: product-service
            dockerfile: services/product-service/Dockerfile
          - name: cart-service
            dockerfile: services/cart-service/Dockerfile
          - name: order-service
            dockerfile: services/order-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER_LC}/ecom-${{ matrix.service.name }}"
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "image=${REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Build summary
        run: |
          echo "### ${{ matrix.service.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pushed**: \`${{ github.event_name != 'pull_request' }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─── Job ③a SSH 部署到 Docker Swarm ─────────────────────────────────────────
  deploy-swarm:
    name: Deploy to Swarm
    needs: build-images
    if: >-
      github.event_name != 'pull_request' &&
      (inputs.platform == 'swarm' || inputs.platform == '')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout (for stack file)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra

      - name: Copy stack configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "infra/"
          target: /opt/ecom

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ steps.vars.outputs.registry }}"
            TAG="${{ steps.vars.outputs.tag }}"
            STACK="ecom"

            # 登录 GHCR（用于 --with-registry-auth 转发凭证到 Worker 节点）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            SERVICES="api-gateway user-service product-service cart-service order-service"

            # 判断是首次部署还是滚动更新
            if ! docker service inspect "${STACK}_api-gateway" >/dev/null 2>&1; then
              echo "══════════════════════════════════════════"
              echo "Stack not found — running initial deployment"
              echo "══════════════════════════════════════════"

              # 移除旧的 stack（如果存在），释放端口
              OLD_STACK=$(docker stack ls --format '{{.Name}}' | grep -v "^${STACK}$" | head -1 || true)
              if [ -n "${OLD_STACK}" ]; then
                echo "Removing old stack: ${OLD_STACK}"
                docker stack rm "${OLD_STACK}"
                echo "Waiting for old stack to drain..."
                DRAIN_TIMEOUT=60
                DRAIN_ELAPSED=0
                while [ ${DRAIN_ELAPSED} -lt ${DRAIN_TIMEOUT} ]; do
                  REMAINING=$(docker service ls --filter "name=${OLD_STACK}_" -q 2>/dev/null | wc -l)
                  if [ "${REMAINING}" -eq 0 ]; then
                    echo "Old stack removed"
                    break
                  fi
                  sleep 5
                  DRAIN_ELAPSED=$((DRAIN_ELAPSED + 5))
                done
              fi

              cd /opt/ecom/infra/swarm
              REGISTRY="${REGISTRY}" TAG="${TAG}" \
                docker stack deploy \
                  --compose-file docker-stack.yml \
                  --with-registry-auth \
                  "${STACK}"

              echo "Waiting for services to start..."
              sleep 30

              echo ""
              echo "══════════ Service status ══════════"
              docker service ls --filter "name=${STACK}_"

              echo ""
              echo "Initial deployment complete."
            else
              echo "Stack exists — rolling update"

              # 逐个服务滚动更新，顺序执行限制爆炸半径
              for SVC in ${SERVICES}; do
                IMAGE="${REGISTRY}/ecom-${SVC}:${TAG}"
                echo "══════════════════════════════════════════"
                echo "Updating ${STACK}_${SVC} → ${IMAGE}"
                echo "══════════════════════════════════════════"

                docker service update \
                  --with-registry-auth \
                  --image "${IMAGE}" \
                  "${STACK}_${SVC}"

                # 等待服务收敛（最多 180 秒）
                echo "Waiting for ${STACK}_${SVC} to converge..."
                TIMEOUT=180
                ELAPSED=0
                while [ ${ELAPSED} -lt ${TIMEOUT} ]; do
                  STATE=$(docker service inspect --format '{{.UpdateStatus.State}}' "${STACK}_${SVC}" 2>/dev/null || echo "unknown")
                  case "${STATE}" in
                    completed)
                      echo "${SVC} update completed"
                      break
                      ;;
                    rollback_completed)
                      echo "${SVC} rolled back! Aborting pipeline."
                      exit 1
                      ;;
                    paused)
                      echo "${SVC} update paused! Aborting pipeline."
                      exit 1
                      ;;
                    *)
                      sleep 5
                      ELAPSED=$((ELAPSED + 5))
                      ;;
                  esac
                done

                if [ ${ELAPSED} -ge ${TIMEOUT} ]; then
                  echo "${SVC} did not converge within ${TIMEOUT}s"
                  exit 1
                fi
              done

              echo ""
              echo "All services updated successfully."
              docker service ls --filter "name=${STACK}_"
            fi

  # ─── Job ③b Kubeconfig 直连 K8s/K3s API Server，Helm 部署 ──────────────────
  deploy-k8s:
    name: Deploy to ${{ inputs.platform }}
    needs: build-images
    if: >-
      github.event_name != 'pull_request' &&
      startsWith(inputs.platform, 'k')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://api.find345.site

    steps:
      - name: Compute image tag and platform config
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          echo "registry=ghcr.io/${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # 根据平台选择 values 文件
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == "k3s-multi" ]]; then
            echo "values_flag=-f infra/k8s/ecom-chart/values-k3s-multi.yaml" >> "$GITHUB_OUTPUT"
          elif [[ "${PLATFORM}" == "k3s-single" ]]; then
            echo "values_flag=-f infra/k8s/ecom-chart/values-k3s.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "values_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (Helm Chart only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: infra/k8s

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          PLATFORM="${{ env.PLATFORM }}"
          if [[ "${PLATFORM}" == k3s* ]]; then
            echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          else
            echo "${{ secrets.K8S_KUBECONFIG }}" | base64 -d > "${HOME}/.kube/config"
          fi
          chmod 600 "${HOME}/.kube/config"

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Create namespace
        run: kubectl create namespace ecom --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace=ecom \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          set -euo pipefail

          REGISTRY="${{ steps.vars.outputs.registry }}"
          TAG="${{ steps.vars.outputs.tag }}"
          NAMESPACE="ecom"
          RELEASE="ecom"
          CHART="infra/k8s/ecom-chart"
          PLATFORM="${{ env.PLATFORM }}"
          HELM_EXTRA_ARGS=()

          echo "══════════════════════════════════════════"
          echo "Deploying ${RELEASE} to ${PLATFORM} (tag: ${TAG})"
          echo "══════════════════════════════════════════"

          # k3s 环境下，Ingress admission webhook 常见短时未就绪，先显式等待
          wait_ingress_admission() {
            if [[ "${PLATFORM}" != k3s* ]]; then
              return 0
            fi

            if kubectl -n ingress-nginx get deployment ingress-nginx-controller >/dev/null 2>&1; then
              echo "Waiting for ingress-nginx controller deployment..."
              kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=180s
            elif kubectl -n ingress-nginx get daemonset ingress-nginx-controller >/dev/null 2>&1; then
              echo "Waiting for ingress-nginx controller daemonset..."
              kubectl -n ingress-nginx rollout status daemonset/ingress-nginx-controller --timeout=180s
            else
              echo "::warning::ingress-nginx-controller not found as Deployment/DaemonSet in namespace ingress-nginx"
            fi

            echo "Waiting for ingress-nginx admission endpoints..."
            for i in $(seq 1 36); do
              EP_READY=$(kubectl -n ingress-nginx get endpoints ingress-nginx-controller-admission -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)
              if [[ -n "${EP_READY}" ]]; then
                echo "ingress-nginx admission endpoint is ready: ${EP_READY}"
                return 0
              fi
              echo "  attempt ${i}/36: admission endpoint not ready, retry in 5s..."
              sleep 5
            done

            echo "::error::ingress-nginx admission endpoints not ready after 180s"
            kubectl -n ingress-nginx get pods -o wide || true
            kubectl -n ingress-nginx get svc ingress-nginx-controller-admission -o wide || true
            kubectl -n ingress-nginx get endpoints ingress-nginx-controller-admission -o yaml || true
            return 1
          }

          ensure_ingress_webhook_fail_open() {
            if [[ "${PLATFORM}" != k3s* ]]; then
              return 0
            fi

            # 在当前 k3s 网络形态下，apiserver -> ingress admission webhook 不可达会导致所有 Ingress 变更超时
            # 直接删除该 ValidatingWebhookConfiguration，确保 Helm 部署不被卡住
            echo "Deleting ingress-nginx admission webhook configuration on k3s..."
            kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true
          }

          dump_debug_state() {
            echo "══════════ DEBUG: pods ══════════"
            kubectl get pods -n "${NAMESPACE}" -o wide || true
            echo ""
            echo "══════════ DEBUG: deployments ══════════"
            kubectl get deploy -n "${NAMESPACE}" || true
            echo ""
            echo "══════════ DEBUG: events (tail 50) ══════════"
            kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp | tail -n 50 || true
            echo ""
            echo "══════════ DEBUG: cnpg clusters ══════════"
            kubectl get cluster -n "${NAMESPACE}" 2>/dev/null || true
            echo ""
            echo "══════════ DEBUG: cert-manager ══════════"
            kubectl get clusterissuer 2>/dev/null || true
          }

          check_core_dependencies() {
            echo "Checking core dependencies..."
            kubectl -n cnpg-system rollout status deployment/cnpg-controller-manager --timeout=180s

            if kubectl -n redis-operator-system get deployment redis-operator-redis-operator >/dev/null 2>&1; then
              kubectl -n redis-operator-system rollout status deployment/redis-operator-redis-operator --timeout=180s || true
            else
              echo "::warning::redis-operator deployment not found in redis-operator-system"
            fi

            if [[ "${PLATFORM}" == k3s* ]]; then
              if kubectl -n ingress-nginx get daemonset ingress-nginx-controller >/dev/null 2>&1; then
                kubectl -n ingress-nginx rollout status daemonset/ingress-nginx-controller --timeout=180s
              elif kubectl -n ingress-nginx get deployment ingress-nginx-controller >/dev/null 2>&1; then
                kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=180s
              else
                echo "::error::ingress-nginx controller not found"
                return 1
              fi
            fi
          }

          preflight_cluster() {
            echo "Running cluster preflight checks..."
            kubectl get nodes -o wide

            # 节点与 CoreDNS 是 k3s 发布的硬前置条件
            kubectl wait --for=condition=Ready node --all --timeout=180s || true
            kubectl -n kube-system rollout status deployment/coredns --timeout=180s || true

            if [[ "${PLATFORM}" == k3s* ]]; then
              echo "Probing in-cluster DNS resolution (kubernetes.default + Let's Encrypt)..."
              DNS_POD="dns-probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              kubectl -n "${NAMESPACE}" delete pod "${DNS_POD}" --ignore-not-found=true >/dev/null 2>&1 || true
              kubectl -n "${NAMESPACE}" run "${DNS_POD}" \
                --image=busybox:1.36 \
                --restart=Never \
                --command -- sh -c 'nslookup kubernetes.default.svc.cluster.local && nslookup acme-v2.api.letsencrypt.org'

              for i in $(seq 1 30); do
                PHASE=$(kubectl -n "${NAMESPACE}" get pod "${DNS_POD}" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
                if [[ "${PHASE}" == "Succeeded" || "${PHASE}" == "Failed" ]]; then
                  break
                fi
                sleep 2
              done

              kubectl -n "${NAMESPACE}" logs "${DNS_POD}" || true
              PHASE=$(kubectl -n "${NAMESPACE}" get pod "${DNS_POD}" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
              kubectl -n "${NAMESPACE}" delete pod "${DNS_POD}" --ignore-not-found=true >/dev/null 2>&1 || true

              if [[ "${PHASE}" != "Succeeded" ]]; then
                echo "::warning::Cluster DNS cannot resolve external domains. Force disable ingress TLS for this deploy."
                HELM_EXTRA_ARGS+=(--set "ingress.tls.enabled=false")
              fi
            fi
          }

          start_progress_watcher() {
            (
              while true; do
                echo "---- deploy progress $(date -u +'%Y-%m-%dT%H:%M:%SZ') ----"
                kubectl get pods -n "${NAMESPACE}" --no-headers 2>/dev/null | awk '{print $1, $2, $3}' || true
                kubectl get deploy -n "${NAMESPACE}" --no-headers 2>/dev/null | awk '{print $1, "ready=" $2, "up-to-date=" $3, "available=" $4}' || true
                sleep 20
              done
            ) &
            WATCHER_PID=$!
          }

          # 清理卡住的 pending 状态 release（上次部署失败残留）
          STATUS=$(helm status "${RELEASE}" -n "${NAMESPACE}" -o json 2>/dev/null | jq -r '.info.status // empty' || true)
          if [[ "${STATUS}" == "pending-install" ]]; then
            echo "检测到 pending-install 状态，删除残留 release..."
            helm uninstall "${RELEASE}" -n "${NAMESPACE}" --no-hooks || true
            # uninstall 可能连带删除 namespace，重新创建
            kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          elif [[ "${STATUS}" == "pending-upgrade" || "${STATUS}" == "pending-rollback" ]]; then
            echo "检测到 ${STATUS} 状态，回滚到上一个稳定版本..."
            helm rollback "${RELEASE}" 0 -n "${NAMESPACE}" --no-hooks || true
          fi

          # 根据平台选择 secrets（K8S_ 或 K3S_ 前缀）
          if [[ "${PLATFORM}" == k3s* ]]; then
            PG_PASS="${{ secrets.K3S_POSTGRES_PASSWORD }}"
            REPL_PASS="${{ secrets.K3S_REPLICATION_PASSWORD }}"
            JWT_ACCESS="${{ secrets.K3S_JWT_ACCESS_SECRET }}"
            JWT_REFRESH="${{ secrets.K3S_JWT_REFRESH_SECRET }}"
            INTERNAL="${{ secrets.K3S_INTERNAL_SECRET }}"
            REDIS_SERVICE_NAME="${{ vars.K3S_REDIS_SERVICE_NAME }}"
          else
            PG_PASS="${{ secrets.K8S_POSTGRES_PASSWORD }}"
            REPL_PASS="${{ secrets.K8S_REPLICATION_PASSWORD }}"
            JWT_ACCESS="${{ secrets.K8S_JWT_ACCESS_SECRET }}"
            JWT_REFRESH="${{ secrets.K8S_JWT_REFRESH_SECRET }}"
            INTERNAL="${{ secrets.K8S_INTERNAL_SECRET }}"
            REDIS_SERVICE_NAME="${{ vars.K8S_REDIS_SERVICE_NAME }}"
          fi

          # 未配置 GitHub Actions Variables 时使用 chart 默认服务名
          REDIS_SERVICE_NAME="${REDIS_SERVICE_NAME:-ecom-redis}"

          # 若集群已有 CNPG 超级用户密码，优先使用其值，避免与仓库 Secret 漂移
          PG_SECRET_NAME="${RELEASE}-pg-superuser"
          if kubectl -n "${NAMESPACE}" get secret "${PG_SECRET_NAME}" >/dev/null 2>&1; then
            PG_PASS_CLUSTER="$(kubectl -n "${NAMESPACE}" get secret "${PG_SECRET_NAME}" -o jsonpath='{.data.password}' | base64 -d)"
            if [[ -n "${PG_PASS_CLUSTER}" ]]; then
              PG_PASS="${PG_PASS_CLUSTER}"
              echo "Using PostgreSQL password from cluster secret: ${PG_SECRET_NAME}"
            fi
          fi

          check_core_dependencies
          preflight_cluster
          wait_ingress_admission
          ensure_ingress_webhook_fail_open

          # ── 预检：在 Helm hook 之外直接跑迁移，捕获完整错误输出 ──
          echo "══════════ Pre-deploy: testing db-migrate ══════════"
          MIGRATE_IMAGE="${REGISTRY}/ecom-api-gateway:${TAG}"
          PG_SECRET_NAME="${RELEASE}-pg-superuser"
          PG_RW_HOST="${RELEASE}-pg-rw"
          PG_PASS_RAW="$(kubectl get secret -n "${NAMESPACE}" "${PG_SECRET_NAME}" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || true)"
          if [[ -n "${PG_PASS_RAW}" ]]; then
            kubectl delete pod -n "${NAMESPACE}" migrate-debug --ignore-not-found=true >/dev/null 2>&1 || true
            cat <<EOPOD | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: migrate-debug
            namespace: ${NAMESPACE}
          spec:
            restartPolicy: Never
            nodeSelector:
              role: app
            imagePullSecrets:
              - name: ghcr-pull-secret
            containers:
              - name: migrate
                image: ${MIGRATE_IMAGE}
                command: ["bun", "run", "packages/database/src/migrate.ts"]
                env:
                  - name: PGHOST
                    value: "${PG_RW_HOST}"
                  - name: PGPORT
                    value: "5432"
                  - name: PGDATABASE
                    value: "ecommerce"
                  - name: PGUSER
                    value: "postgres"
                  - name: PGPASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: ${PG_SECRET_NAME}
                        key: password
          EOPOD

            # 等待 Pod 结束（最多 120 秒）
            if kubectl wait -n "${NAMESPACE}" pod/migrate-debug --for=condition=Ready --timeout=5s 2>/dev/null; then
              true
            fi
            kubectl wait -n "${NAMESPACE}" pod/migrate-debug \
              --for=jsonpath='{.status.phase}'=Succeeded \
              --timeout=120s 2>/dev/null || true

            PHASE=$(kubectl get pod -n "${NAMESPACE}" migrate-debug -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            echo "migrate-debug pod phase: ${PHASE}"
            echo "══════════ migrate-debug logs ══════════"
            kubectl logs -n "${NAMESPACE}" migrate-debug --tail=200 2>&1 || true
            kubectl delete pod -n "${NAMESPACE}" migrate-debug --ignore-not-found=true >/dev/null 2>&1 || true

            if [[ "${PHASE}" == "Succeeded" ]]; then
              echo "Pre-deploy migration succeeded."
            else
              echo "::error::Pre-deploy migration failed! Check logs above."
              exit 1
            fi
          else
            echo "::warning::Secret ${PG_SECRET_NAME} not found, skipping pre-deploy migration test (first install?)"
          fi

          HELM_MAX_RETRIES=3
          HELM_ATTEMPT=1
          while [ ${HELM_ATTEMPT} -le ${HELM_MAX_RETRIES} ]; do
            echo "Helm upgrade attempt ${HELM_ATTEMPT}/${HELM_MAX_RETRIES}"

            set +e
            start_progress_watcher
            HELM_OUTPUT=$(
              helm upgrade --install "${RELEASE}" "${CHART}" \
                --namespace "${NAMESPACE}" \
                --create-namespace \
                ${{ steps.vars.outputs.values_flag }} \
                --set "global.registry=${REGISTRY}" \
                --set "global.imageTag=${TAG}" \
                --set "global.imagePullSecrets[0]=ghcr-pull-secret" \
                --set "redis.serviceName=${REDIS_SERVICE_NAME}" \
                --set-string "secrets.postgresPassword=${PG_PASS}" \
                --set-string "secrets.replicationPassword=${REPL_PASS}" \
                --set-string "secrets.jwtAccessSecret=${JWT_ACCESS}" \
                --set-string "secrets.jwtRefreshSecret=${JWT_REFRESH}" \
                --set-string "secrets.internalSecret=${INTERNAL}" \
                "${HELM_EXTRA_ARGS[@]}" \
                --wait \
                --wait-for-jobs \
                --timeout 600s 2>&1
            )
            HELM_EXIT=$?
            kill "${WATCHER_PID}" >/dev/null 2>&1 || true
            wait "${WATCHER_PID}" 2>/dev/null || true
            set -e

            echo "${HELM_OUTPUT}"

            if [ ${HELM_EXIT} -eq 0 ]; then
              echo "Helm deploy succeeded."
              break
            fi

            if echo "${HELM_OUTPUT}" | grep -q 'validate.nginx.ingress.kubernetes.io'; then
              if [ ${HELM_ATTEMPT} -lt ${HELM_MAX_RETRIES} ]; then
                echo "Detected ingress admission webhook timeout, waiting and retrying..."
                wait_ingress_admission || true
                sleep 10
                HELM_ATTEMPT=$((HELM_ATTEMPT + 1))
                continue
              fi
            fi

            if echo "${HELM_OUTPUT}" | grep -q 'post-upgrade hooks failed: resource Job/ecom/ecom-db-migrate'; then
              echo "::warning::db-migrate hook failed, collecting diagnostics..."
              kubectl get job -n "${NAMESPACE}" ecom-db-migrate -o wide || true
              kubectl describe job -n "${NAMESPACE}" ecom-db-migrate || true
              echo "══════════ migrate pods ══════════"
              kubectl get pods -n "${NAMESPACE}" -l app.kubernetes.io/name=db-migrate -o wide || true
              echo "══════════ migrate pod logs (all containers) ══════════"
              for POD in $(kubectl get pods -n "${NAMESPACE}" -l app.kubernetes.io/name=db-migrate -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                echo "--- pod: ${POD} ---"
                echo ">> init container (wait-pg):"
                kubectl logs -n "${NAMESPACE}" "${POD}" -c wait-pg --tail=20 2>&1 || true
                echo ">> main container (migrate):"
                kubectl logs -n "${NAMESPACE}" "${POD}" -c migrate --tail=100 2>&1 || true
                echo ">> termination message:"
                kubectl get pod -n "${NAMESPACE}" "${POD}" -o jsonpath='{.status.containerStatuses[0].state.terminated.message}' 2>&1 || true
                echo ""
              done
            fi

            echo "::error::Helm deploy failed"
            dump_debug_state
            exit ${HELM_EXIT}
          done

      - name: Verify deployment
        if: always()
        run: |
          echo "══════════ Pod Status ══════════"
          kubectl get pods -n ecom -o wide

          echo ""
          echo "══════════ Services ══════════"
          kubectl get svc -n ecom

          echo ""
          echo "══════════ Helm Release ══════════"
          helm list -n ecom

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "${HOME}/.kube/config"

  # ─── Job ④ 外部健康检查 ─────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: [deploy-swarm, deploy-k8s]
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (needs.deploy-swarm.result == 'success' || needs.deploy-k8s.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          URL="https://${{ env.DOMAIN }}/health"
          echo "Smoke testing: ${URL}"

          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' \
              --max-time 10 \
              -X POST "${URL}" 2>/dev/null) || HTTP_CODE="000"

            if [ "${HTTP_CODE}" = "200" ]; then
              echo "Health check passed (attempt ${i}/20)"
              cat /tmp/health.json
              exit 0
            fi

            echo "  attempt ${i}/20 — HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 20 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Deploy summary
        if: always()
        run: |
          PLATFORM="${{ env.PLATFORM }}"
          case "${PLATFORM}" in
            swarm)      PLATFORM_LABEL="Docker Swarm" ;;
            k3s-single) PLATFORM_LABEL="K3s single (Helm)" ;;
            k3s-multi)  PLATFORM_LABEL="K3s multi (Helm)" ;;
            k8s)        PLATFORM_LABEL="Kubernetes (Helm)" ;;
            *)          PLATFORM_LABEL="${PLATFORM}" ;;
          esac

          echo "## ${PLATFORM_LABEL} Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA::12}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Domain** | [https://${{ env.DOMAIN }}](https://${{ env.DOMAIN }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Platform** | ${PLATFORM_LABEL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trigger** | \`${GITHUB_EVENT_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | \`${GITHUB_ACTOR}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Services" >> "$GITHUB_STEP_SUMMARY"
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          CUSTOM_TAG="${{ inputs.image_tag }}"
          TAG="${CUSTOM_TAG:-${GITHUB_SHA::12}}"
          for SVC in api-gateway user-service product-service cart-service order-service; do
            echo "- \`ghcr.io/${OWNER_LC}/ecom-${SVC}:${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          done
