name: Deploy to Server
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/my-app

            git pull origin main

            ACTIVE=$(docker ps --filter "label=caddy=api.find345.site" --format "{{.Names}}")

            if [[ "$ACTIVE" == "api-blue" ]]; then
              NEW=api-green
              OLD=api-blue
            else
              NEW=api-blue
              OLD=api-green
            fi

            echo "Active: $OLD"
            echo "Deploying: $NEW"

            docker compose build $NEW
            docker compose up -d $NEW

            echo "Waiting for health..."

            until docker inspect --format='{{.State.Health.Status}}' $NEW | grep -q "healthy"; do
              sleep 2
            done

            echo "Switching traffic..."

            docker container update \
              --label-add caddy=api.find345.site \
              --label-add caddy.reverse_proxy="{{upstreams 3000}}" \
              $NEW

            docker container update \
              --label-rm caddy \
              --label-rm caddy.reverse_proxy \
              $OLD

            docker exec caddy caddy reload --config /etc/caddy/Caddyfile

            echo "Stopping old version..."
            docker compose stop $OLD

            echo "Zero-downtime deployment complete."