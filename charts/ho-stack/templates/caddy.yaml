{{- if .Values.caddy.enabled }}
{{- $siteAddress := .Values.caddy.host | default ":80" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ho-stack.fullname" . }}-caddyfile
  labels:
    {{- include "ho-stack.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {{ $siteAddress }} {
      encode gzip zstd

      @health path /healthz
      respond @health "ok" 200

      reverse_proxy {{ include "ho-stack.apiName" . }}-active.{{ .Release.Namespace }}.svc.cluster.local:80 {
        lb_policy random_choose 2
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ho-stack.fullname" . }}-caddy
  labels:
    {{- include "ho-stack.labels" . | nindent 4 }}
    component: caddy
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "ho-stack.selectorLabels" . | nindent 6 }}
      component: caddy
  template:
    metadata:
      labels:
        {{- include "ho-stack.selectorLabels" . | nindent 8 }}
        component: caddy
    spec:
      containers:
        - name: caddy
          image: {{ .Values.caddy.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.caddy.resources | nindent 12 }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "ho-stack.fullname" . }}-caddyfile
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ho-stack.fullname" . }}-caddy
  labels:
    {{- include "ho-stack.labels" . | nindent 4 }}
spec:
  type: {{ .Values.caddy.service.type }}
  ports:
    - name: http
      port: {{ .Values.caddy.service.port }}
      targetPort: http
      {{- if and (eq .Values.caddy.service.type "NodePort") .Values.caddy.service.nodePort }}
      nodePort: {{ .Values.caddy.service.nodePort }}
      {{- end }}
    - name: https
      port: {{ .Values.caddy.service.httpsPort | default 443 }}
      targetPort: https
      {{- if and (eq .Values.caddy.service.type "NodePort") .Values.caddy.service.httpsNodePort }}
      nodePort: {{ .Values.caddy.service.httpsNodePort }}
      {{- end }}
  selector:
    {{- include "ho-stack.selectorLabels" . | nindent 4 }}
    component: caddy
{{- end }}
