{{- if and .Values.postgres.enabled .Values.postgres.replica.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ho-stack.postgresReplica" . }}
  labels:
    {{- include "ho-stack.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ho-stack.postgresReplica" . }}
  replicas: {{ .Values.postgres.replica.replicaCount }}
  selector:
    matchLabels:
      {{- include "ho-stack.selectorLabels" . | nindent 6 }}
      component: postgres-replica
  template:
    metadata:
      labels:
        {{- include "ho-stack.selectorLabels" . | nindent 8 }}
        component: postgres-replica
    spec:
      initContainers:
        - name: clone-primary
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              set -e
              if [ -s /var/lib/postgresql/data/PG_VERSION ]; then
                echo "Replica data already exists, skip basebackup"
                exit 0
              fi

              until pg_isready -h {{ include "ho-stack.postgresPrimary" . }} -p {{ .Values.postgres.port }} -U {{ .Values.postgres.replicationUser }}; do
                echo "waiting for primary"
                sleep 2
              done

              export PGPASSWORD='{{ .Values.postgres.replicationPassword }}'
              pg_basebackup -h {{ include "ho-stack.postgresPrimary" . }} -p {{ .Values.postgres.port }} -D /var/lib/postgresql/data -U {{ .Values.postgres.replicationUser }} -v -P -R

              cat >> /var/lib/postgresql/data/postgresql.auto.conf <<CONF
              primary_conninfo = 'host={{ include "ho-stack.postgresPrimary" . }} port={{ .Values.postgres.port }} user={{ .Values.postgres.replicationUser }} password={{ .Values.postgres.replicationPassword }}'
              hot_standby = on
              CONF
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.postgres.port }}
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ho-stack.fullname" . }}-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ho-stack.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "ho-stack.fullname" . }}-secrets
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.replica.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.replica.storage }}
{{- end }}
