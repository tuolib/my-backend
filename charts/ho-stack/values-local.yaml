image:
  repository: ho-api

api:
  activeColor: blue
  env:
    JWT_SECRET: local-dev-secret
    # 与生产保持一致：PgBouncer 负责连接池，应用层每 Pod 只需少量连接
    DB_POOL_MAX: "5"
    NODE_ENV: "development"
    LOG_LEVEL: "debug"
  blue:
    replicaCount: 2
    image:
      tag: local
  green:
    replicaCount: 1
    image:
      tag: local
  hpa:
    enabled: false
  pdb:
    minAvailable: 1

postgres:
  password: password
  replicationPassword: repl_password
  replica:
    replicaCount: 1

pgbouncer:
  rw:
    replicaCount: 1
  ro:
    replicaCount: 1

redis:
  storage: 1Gi

caddy:
  # 本地开发通过 localhost:3000 访问，kind-config 将 hostPort:3000 映射到 NodePort:30080
  # 使用 :80（无 host 过滤、无 HTTPS 证书要求），无需域名即可访问
  host: :80
  service:
    type: NodePort
    port: 80
    httpsPort: 443
    nodePort: 30080
