global:
  nameOverride: ""
  fullnameOverride: ""

image:
  repository: ghcr.io/your-org/ho-api
  pullPolicy: IfNotPresent

api:
  containerPort: 3000
  activeColor: blue
  standbyReplicas: 1
  env:
    JWT_SECRET: super_secret_123
    DB_POOL_MAX: "30"
  blue:
    enabled: true
    replicaCount: 3
    image:
      tag: latest
  green:
    enabled: true
    replicaCount: 1
    image:
      tag: latest
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 65
  pdb:
    enabled: true
    minAvailable: 2

postgres:
  enabled: true
  image: postgres:16-alpine
  database: mydb
  username: user
  password: password
  replicationUser: replicator
  replicationPassword: repl_password
  port: 5432
  primary:
    storage: 20Gi
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi
  replica:
    enabled: true
    replicaCount: 2
    storage: 20Gi
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi

pgbouncer:
  enabled: true
  image: edoburu/pgbouncer:1.23.1
  port: 6432
  maxClientConn: 2000
  defaultPoolSize: 200
  reservePoolSize: 50
  rw:
    replicaCount: 2
  ro:
    replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

caddy:
  enabled: true
  image: caddy:2.8-alpine
  host: api.localtest.me
  service:
    type: LoadBalancer
    port: 80
    nodePort: 30080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
