global:
  nameOverride: ""
  fullnameOverride: ""

image:
  repository: ghcr.io/your-org/ho-api
  pullPolicy: IfNotPresent

api:
  containerPort: 3000
  activeColor: blue
  standbyReplicas: 1
  env:
    JWT_SECRET: super_secret_123
    # DB_POOL_MAX 从 30 降至 5：
    # PgBouncer 负责连接池化，应用层只需少量连接。
    # 30 pods × 5 = 150 个客户端连接到 PgBouncer（远低于其 maxClientConn=2000），
    # PgBouncer 再复用 200 条到 PostgreSQL，彻底解决突发扩容时的连接风暴问题。
    DB_POOL_MAX: "5"
    DB_STRICT_READ_READINESS: "false"
    NODE_ENV: "production"
    LOG_LEVEL: "info"
  blue:
    enabled: true
    replicaCount: 3
    image:
      tag: latest
  green:
    enabled: true
    replicaCount: 1
    image:
      tag: latest
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 65
  pdb:
    enabled: true
    minAvailable: 2

postgres:
  enabled: true
  image: postgres:16-alpine
  database: mydb
  username: user
  password: password
  replicationUser: replicator
  replicationPassword: repl_password
  port: 5432
  primary:
    storage: 20Gi
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi
  replica:
    enabled: true
    # 从 2 增加到 3：读流量 10 倍时，3 个副本分摊负载更均衡，
    # 同时保证主库故障时仍有 2 个副本可读
    replicaCount: 3
    storage: 20Gi
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1500m
        memory: 2Gi

pgbouncer:
  enabled: true
  image: edoburu/pgbouncer:latest
  port: 5432
  maxClientConn: 2000
  defaultPoolSize: 200
  reservePoolSize: 50
  rw:
    replicaCount: 2
  ro:
    replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

caddy:
  enabled: true
  image: caddy:2.8-alpine
  host: api.localtest.me
  service:
    type: LoadBalancer
    port: 80
    nodePort: 30080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
