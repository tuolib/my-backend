version: "3.9"

services:
  # --- 基础设施网关 ---
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.8-alpine
    container_name: caddy-gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_INGRESS_NETWORKS=app-network
    networks:
      - app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    restart: always

  # --- 数据库 ---
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      retries: 5

  # --- 缓存 ---
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    networks:
      - app-network

  # --- 应用层 (核心蓝绿逻辑) ---
  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: api-${DEPLOY_COLOR} # 动态生成 api-blue 或 api-green
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydb
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    labels:
      caddy: api.find345.site
      caddy.reverse_proxy: "{{upstreams 3000}}"
      # 流量控制闸门：只有匹配 ACTIVE_COLOR 环境变量的容器才接流
      caddy.@active: "expression {env.ACTIVE_COLOR} == '${DEPLOY_COLOR}'"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  caddy_data:
  postgres_data: