version: "3.9"

services:

  # =============================
  # CADDY REVERSE PROXY
  # =============================
  caddy:
    image: lucaslorentz/caddy-docker-proxy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_INGRESS_NETWORKS=app-network
    networks:
      - app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    restart: unless-stopped

  # =============================
  # POSTGRES
  # =============================
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # =============================
  # REDIS
  # =============================
  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - app-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # =============================
  # API BLUE (当前线上版本)
  # =============================
  api-blue:
    build: ./backend
    container_name: api-blue
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_123
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      caddy: api.find345.site
      caddy.reverse_proxy: "{{upstreams 3000}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

  # =============================
  # API GREEN (待发布版本)
  # =============================
  api-green:
    build: ./backend
    container_name: api-green
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_123
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always

# =============================
# NETWORK
# =============================
networks:
  app-network:
    driver: bridge

# =============================
# VOLUMES
# =============================
volumes:
  caddy_data:
  postgres_data:
  redis_data: