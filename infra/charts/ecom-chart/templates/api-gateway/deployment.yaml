# api-gateway/deployment.yaml — API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecom.fullname" . }}-api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        {{- include "ecom.labels" . | nindent 8 }}
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "ecom.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: 5
      nodeSelector:
        {{- toYaml .Values.apiGateway.nodeSelector | nindent 8 }}
      containers:
        - name: api-gateway
          image: {{ include "ecom.serviceImage" (dict "registry" .Values.global.registry "image" .Values.apiGateway.image "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.port }}
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: {{ .Values.apiGateway.port | quote }}
            {{- include "ecom.commonEnv" . | nindent 12 }}
            # 内部服务地址
            - name: USER_SERVICE_URL
              value: "http://{{ include "ecom.fullname" . }}-user-service:{{ .Values.userService.port }}"
            - name: PRODUCT_SERVICE_URL
              value: "http://{{ include "ecom.fullname" . }}-product-service:{{ .Values.productService.port }}"
            - name: CART_SERVICE_URL
              value: "http://{{ include "ecom.fullname" . }}-cart-service:{{ .Values.cartService.port }}"
            - name: ORDER_SERVICE_URL
              value: "http://{{ include "ecom.fullname" . }}-order-service:{{ .Values.orderService.port }}"
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          {{- include "ecom.securityContext" . | nindent 10 }}
          {{- include "ecom.probes" (dict "port" .Values.apiGateway.port "path" "/health/live") | nindent 10 }}
