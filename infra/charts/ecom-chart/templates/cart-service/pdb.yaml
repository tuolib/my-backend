# cart-service/pdb.yaml — PodDisruptionBudget（仅多副本时生效）
{{- if gt (int .Values.cartService.replicas) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ecom.fullname" . }}-cart-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
    app.kubernetes.io/name: cart-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cart-service
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
