# product-service/deployment.yaml — 商品与库存服务 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecom.fullname" . }}-product-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
    app.kubernetes.io/name: product-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.productService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: product-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "ecom.labels" . | nindent 8 }}
        app.kubernetes.io/name: product-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "ecom.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: 30
      nodeSelector:
        {{- toYaml .Values.productService.nodeSelector | nindent 8 }}
      containers:
        - name: product-service
          image: {{ include "ecom.serviceImage" (dict "registry" .Values.global.registry "image" .Values.productService.image "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.productService.port }}
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: {{ .Values.productService.port | quote }}
            {{- include "ecom.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.productService.resources | nindent 12 }}
          {{- include "ecom.securityContext" . | nindent 10 }}
          {{- include "ecom.probes" (dict "port" .Values.productService.port) | nindent 10 }}
