# redis-replication.yaml — Redis Operator (OT-Container-Kit) RedisReplication CR
# 替代: redis-primary + redis-replica + redis-sentinel × 3
# Operator 自动管理主从复制和故障转移
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisReplication
metadata:
  name: {{ include "ecom.fullname" . }}-redis
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
spec:
  clusterSize: {{ .Values.redis.clusterSize }}
  kubernetesConfig:
    image: {{ .Values.redis.image }}
    imagePullPolicy: {{ .Values.global.imagePullPolicy }}
    resources:
      requests:
        cpu: {{ .Values.redis.resources.requests.cpu | quote }}
        memory: {{ .Values.redis.resources.requests.memory | quote }}
      limits:
        cpu: {{ .Values.redis.resources.limits.cpu | quote }}
        memory: {{ .Values.redis.resources.limits.memory | quote }}
  redisConfig:
    additionalRedisConfig: {{ include "ecom.fullname" . }}-redis-config
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
        storageClassName: {{ .Values.redis.storage.storageClass }}
  nodeSelector:
    {{- toYaml .Values.redis.nodeSelector | nindent 4 }}
---
# Redis 参数 ConfigMap（从 redis.conf 迁移）
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ecom.fullname" . }}-redis-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
data:
  redis-additional.conf: |
    maxmemory {{ .Values.redis.config.maxmemory }}
    maxmemory-policy {{ .Values.redis.config.maxmemoryPolicy }}
    tcp-keepalive 300
    save 900 1
    save 300 10
    save 60 10000
