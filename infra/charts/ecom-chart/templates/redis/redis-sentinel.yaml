# redis-sentinel.yaml — Sentinel 监控 RedisReplication，自动故障转移
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisSentinel
metadata:
  name: {{ include "ecom.fullname" . }}-redis-sentinel
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
spec:
  clusterSize: 3
  redisSentinelConfig:
    redisReplicationName: {{ include "ecom.fullname" . }}-redis
    masterGroupName: "mymaster"
    redisPort: "6379"
    quorum: "2"
    parallelSyncs: "1"
    failoverTimeout: "30000"
    downAfterMilliseconds: "5000"
  kubernetesConfig:
    image: {{ .Values.redis.image }}
    imagePullPolicy: {{ .Values.global.imagePullPolicy }}
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
  nodeSelector:
    {{- toYaml .Values.redis.nodeSelector | nindent 4 }}
