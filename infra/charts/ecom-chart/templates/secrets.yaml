# secrets.yaml — K8s Secret（所有微服务共享的敏感配置）
# 部署时通过 helm install --set secrets.postgresPassword=xxx 传入
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ecom.secretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgresPassword | quote }}
  database-url: {{ printf "postgresql://postgres:%s@%s:5432/%s" (.Values.secrets.postgresPassword | urlquery) (include "ecom.pgRwHost" .) .Values.postgresql.database | quote }}
  jwt-access-secret: {{ .Values.secrets.jwtAccessSecret | quote }}
  jwt-refresh-secret: {{ .Values.secrets.jwtRefreshSecret | quote }}
  internal-secret: {{ .Values.secrets.internalSecret | quote }}
