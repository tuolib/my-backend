# HAProxy — PostgreSQL 连接路由（Patroni 自动故障转移）
# 通过 Patroni REST API 健康检查自动发现 Leader/Replica

global
    maxconn 1000
    log stdout format raw local0

defaults
    mode tcp
    log global
    timeout connect 5s
    timeout client  30m
    timeout server  30m
    timeout check   3s

# Docker Swarm DNS 解析器 — 运行时动态解析服务名
# 解决后端服务还未启动时 HAProxy 启动失败的问题
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold other      10s
    hold refused    10s
    hold nx         10s
    hold timeout    10s
    hold valid      10s

# ── Primary（读写）— 端口 5432 ──
# 应用服务通过此端口连接，自动路由到当前 Patroni Leader
listen pg_primary
    bind *:5432
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 100 check port 8008 resolvers docker init-addr none
    server patroni-1 patroni-1:5432 check
    server patroni-2 patroni-2:5432 check

# ── Replica（只读）— 端口 5433 ──
# 预留读写分离，只路由到 Replica 节点
listen pg_replica
    bind *:5433
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 maxconn 100 check port 8008 resolvers docker init-addr none
    server patroni-1 patroni-1:5432 check
    server patroni-2 patroni-2:5432 check

# ── 监控面板 — 端口 7000 ──
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 10s
