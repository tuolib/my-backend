# values-multi.yaml — k3s 多节点生产环境覆盖值
# 用法: helm install ecom ../charts/ecom-chart -f values-multi.yaml
#
# 与 values.yaml（单节点）的区别:
#   - nodeSelector 按角色分布（data / ingress / app），同 k8s
#   - PG 实例数 2（主 + 备）、Redis 集群 3 节点
#   - 各服务 2 副本
#   - 资源配额介于单节点和 k8s 之间（适配中配 VPS 集群）

postgresql:
  instances: 2
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nodeSelector:
    role: data

redis:
  clusterSize: 3
  storage:
    size: 2Gi
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  nodeSelector:
    role: data

apiGateway:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  nodeSelector:
    role: app

userService:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  nodeSelector:
    role: app

productService:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  nodeSelector:
    role: app

cartService:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  nodeSelector:
    role: app

orderService:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  nodeSelector:
    role: app

ingress:
  tls:
    enabled: true
