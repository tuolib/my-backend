# kubeadm-config.yaml — kubeadm 集群初始化配置
# 使用 kube-vip 提供 Control Plane HA VIP
# 适用于 5 节点自建机房部署（3 Control Plane + 2 Worker）
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: "v1.29.0"
clusterName: ecom-cluster
# kube-vip 提供的 VIP 地址，所有 Control Plane 节点共享
# 部署前需修改为实际分配的 VIP
controlPlaneEndpoint: "KUBE_VIP_ADDRESS:6443"
networking:
  podSubnet: "10.244.0.0/16"       # Calico 默认 CIDR
  serviceSubnet: "10.96.0.0/12"
  dnsDomain: "cluster.local"
apiServer:
  certSANs:
    - "KUBE_VIP_ADDRESS"
    - "S1_IP"
    - "S2_IP"
    - "S3_IP"
    - "127.0.0.1"
  extraArgs:
    audit-log-maxage: "30"
    audit-log-maxbackup: "10"
    audit-log-maxsize: "100"
controllerManager:
  extraArgs:
    bind-address: "0.0.0.0"
scheduler:
  extraArgs:
    bind-address: "0.0.0.0"
etcd:
  local:
    dataDir: /var/lib/etcd
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "S1_IP"
  bindPort: 6443
nodeRegistration:
  criSocket: "unix:///run/containerd/containerd.sock"
  taints:
    - key: "node-role.kubernetes.io/control-plane"
      effect: "NoSchedule"
