# cluster-issuer.yaml — cert-manager ClusterIssuer
# Let's Encrypt 自动签发和续期 TLS 证书（替代 Caddy 自动 HTTPS）
{{- if .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuer }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.certManager.email }}
    server: {{ .Values.certManager.server }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuer }}-account-key
    solvers:
      # HTTP-01 验证方式（通过 Nginx Ingress 自动处理）
      - http01:
          ingress:
            class: nginx
{{- end }}
