# configmap.yaml — 非敏感配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ecom.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.services.nodeEnv | quote }}
  LOG_LEVEL: {{ .Values.services.logLevel | quote }}
  CORS_ORIGINS: {{ .Values.services.corsOrigins | quote }}
  # 服务间通信地址
  USER_SERVICE_URL: "http://{{ include "ecom.fullname" . }}-user-service:{{ .Values.userService.port }}"
  PRODUCT_SERVICE_URL: "http://{{ include "ecom.fullname" . }}-product-service:{{ .Values.productService.port }}"
  CART_SERVICE_URL: "http://{{ include "ecom.fullname" . }}-cart-service:{{ .Values.cartService.port }}"
  ORDER_SERVICE_URL: "http://{{ include "ecom.fullname" . }}-order-service:{{ .Values.orderService.port }}"
