# db-migrate-job.yaml — Helm hook 数据库迁移 Job
# 在 helm install/upgrade 完成后运行 Drizzle ORM 迁移
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ecom.fullname" . }}-db-migrate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
  annotations:
    # Helm hook: 在 install/upgrade 之后运行（PG 已创建）
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # 成功后保留 Job 供查看日志，下次 hook 运行时删除旧的
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        {{- toYaml .Values.apiGateway.nodeSelector | nindent 8 }}
      initContainers:
        # 等待 PostgreSQL 就绪后再运行迁移
        - name: wait-pg
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "等待 PostgreSQL 就绪..."
              until nc -z {{ include "ecom.fullname" . }}-pg-rw 5432; do
                echo "PostgreSQL 未就绪，5s 后重试..."
                sleep 5
              done
              echo "PostgreSQL 已就绪"
      containers:
        - name: migrate
          image: {{ include "ecom.serviceImage" (dict "registry" .Values.global.registry "image" .Values.apiGateway.image "tag" .Values.global.imageTag) }}
          command:
            - sh
            - -c
            - |
              echo "=== migrate container started ==="
              echo "NODE_ENV=${NODE_ENV:-unset}"
              echo "DATABASE_URL set: $([ -n "$DATABASE_URL" ] && echo yes || echo NO)"
              ls -la packages/database/src/migrate.ts 2>&1 || echo "ERROR: migrate.ts not found"
              ls packages/database/src/migrations/ 2>&1 || echo "ERROR: migrations dir not found"
              echo "=== running migration ==="
              bun run packages/database/src/migrate.ts
          terminationMessagePolicy: FallbackToLogsOnError
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecom.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecom.secretName" . }}
                  key: database-url
