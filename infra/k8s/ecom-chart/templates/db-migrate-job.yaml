# db-migrate-job.yaml — Helm hook 数据库迁移 Job
# 在 helm install/upgrade 完成后运行 Drizzle ORM 迁移
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ecom.fullname" . }}-db-migrate
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
  annotations:
    # Helm hook: 在 install/upgrade 之后运行（PG 已创建）
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # 成功后保留 Job 供查看日志，下次 hook 运行时删除旧的
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      nodeSelector:
        {{- toYaml .Values.apiGateway.nodeSelector | nindent 8 }}
      initContainers:
        # 等待 PostgreSQL 就绪后再运行迁移
        - name: wait-pg
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "等待 PostgreSQL 就绪..."
              until nc -z {{ include "ecom.fullname" . }}-pg-rw 5432; do
                echo "PostgreSQL 未就绪，5s 后重试..."
                sleep 5
              done
              echo "PostgreSQL 已就绪"
      containers:
        - name: migrate
          image: {{ include "ecom.serviceImage" (dict "registry" .Values.global.registry "image" .Values.apiGateway.image "tag" .Values.global.imageTag) }}
          command: ["bun", "run", "packages/database/src/migrate.ts"]
          env:
            # 直接从 CNPG 超级用户 Secret 读取密码，避免 URL 编码问题
            - name: PGHOST
              value: {{ include "ecom.pgRwHost" . }}
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgresql.database }}
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecom.pgSecretName" . }}
                  key: password
