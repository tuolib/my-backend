# pg-superuser-secret.yaml — CloudNativePG 超级用户凭据
# CloudNativePG 要求以特定格式提供 Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ecom.pgSecretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ecom.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ .Values.secrets.postgresPassword | quote }}
