# Patroni 配置 — PostgreSQL 高可用集群
# 环境变量覆盖：PATRONI_NAME, PATRONI_SUPERUSER_PASSWORD, PATRONI_REPLICATION_PASSWORD

scope: ecom-pg
namespace: /ecom

# 节点名称由环境变量 PATRONI_NAME 注入（patroni-1 / patroni-2）
name: "${PATRONI_NAME}"

restapi:
  listen: 0.0.0.0:8008
  connect_address: "${PATRONI_NAME}:8008"

etcd3:
  hosts: etcd-1:2379,etcd-2:2379,etcd-3:2379

# 故障检测参数：TTL 30s + loop_wait 10s → 最快 ~20s 检测到故障
# retry_timeout 10s → Leader 选举超时
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576  # 1MB — 防止落后太多的副本被提升

    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        # 连接
        max_connections: 200
        superuser_reserved_connections: 3
        # 内存
        shared_buffers: 256MB
        effective_cache_size: 512MB
        work_mem: 4MB
        maintenance_work_mem: 64MB
        # WAL
        wal_level: replica
        wal_buffers: 16MB
        max_wal_senders: 5
        max_replication_slots: 5
        max_wal_size: 2GB
        checkpoint_completion_target: 0.9
        hot_standby: "on"
        # 查询优化（SSD）
        random_page_cost: 1.1
        effective_io_concurrency: 200
        default_statistics_target: 100
        # 日志
        log_min_duration_statement: 200
        log_statement: "none"
        log_timezone: "UTC"
        timezone: "UTC"

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  post_init: /usr/local/bin/post-init.sh

postgresql:
  listen: 0.0.0.0:5432
  connect_address: "${PATRONI_NAME}:5432"
  data_dir: /var/lib/postgresql/data/pgdata
  pgpass: /tmp/pgpass0

  authentication:
    superuser:
      username: postgres
      password: "${PATRONI_SUPERUSER_PASSWORD}"
    replication:
      username: replicator
      password: "${PATRONI_REPLICATION_PASSWORD}"

  parameters:
    listen_addresses: "*"

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
