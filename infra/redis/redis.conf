# Redis 7 调优配置

# ── 内存 ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── 持久化 ──
# 禁用 RDB fork 快照（fork 阻塞主线程，导致请求毛刺）
# 改用 AOF 增量持久化，对延迟影响极小
save ""
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# 重写 AOF 时不阻塞 fsync，避免延迟尖刺
no-appendfsync-on-rewrite yes

# ── 网络 ──
tcp-keepalive 300
timeout 0
bind 0.0.0.0

# ── 日志 ──
loglevel notice
