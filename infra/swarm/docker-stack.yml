# Docker Swarm Stack — 企业级电商平台生产部署
# 5 节点集群：S1/S2 数据层(Manager), S3 入口层(Manager), S4/S5 应用层(Worker)
#
# VPC 网络分层：
#   frontend_net — DMZ 入口层（nginx <-> api-gateway）
#   app_net      — 应用通信层（api-gateway <-> 微服务）
#   data_net     — 数据层（微服务 <-> PG/Redis）
#
# 隔离效果：
#   - nginx 只能访问 api-gateway，无法触达数据库和微服务
#   - api-gateway 能到微服务，但不直连数据库
#   - 只有微服务能访问 PG/Redis
#   - 数据库对外完全不可达
#
# 前置要求：
#   1. 构建并推送镜像到 Registry（设置 REGISTRY 环境变量）
#   2. 运行 deploy.sh 初始化集群、创建 Secrets
#   3. SSL 证书由 certbot 服务自动申请和续签（无需手动管理）
#
# 部署命令：
#   REGISTRY=your-registry.com/org TAG=v1.0.0 \
#     docker stack deploy -c docker-stack.yml ecom

version: "3.8"

services:
  # ══════════════════════════════════════════════════
  # 基础设施层 — PostgreSQL（约束到 Manager/数据节点）
  # ══════════════════════════════════════════════════

  postgres-primary:
    image: postgres:16-alpine
    hostname: postgres-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ecommerce
    secrets:
      - postgres_password
    configs:
      - source: pg_conf
        target: /etc/postgresql/postgresql.conf
      - source: pg_init_sql
        target: /docker-entrypoint-initdb.d/01-init.sql
      - source: pg_init_replication
        target: /docker-entrypoint-initdb.d/02-replication.sh
        mode: 0755
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
    command: >-
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c hot_standby=on
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-primary
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  postgres-replica:
    image: postgres:16-alpine
    hostname: postgres-replica
    secrets:
      - postgres_password
    configs:
      - source: pg_replica_conf
        target: /etc/postgresql/postgresql.conf
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        chown -R postgres:postgres /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
        if [ ! -s "/var/lib/postgresql/data/PG_VERSION" ]; then
          echo "=== Initializing replica from primary ==="
          until PGPASSWORD=$$(cat /run/secrets/postgres_password) pg_isready -h postgres-primary -U postgres; do
            echo "Waiting for primary to be ready..."
            sleep 3
          done
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=$$(cat /run/secrets/postgres_password) gosu postgres pg_basebackup \
            -h postgres-primary -U postgres -D /var/lib/postgresql/data \
            -Fp -Xs -R -P
          echo "=== Replica initialized successfully ==="
        fi
        exec gosu postgres postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-replica
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ══════════════════════════════════════════════════
  # 基础设施层 — Redis（约束到 Manager/数据节点）
  # ══════════════════════════════════════════════════

  redis-primary:
    image: redis:7-alpine
    hostname: redis-primary
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes:
      - redis_primary_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-primary
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s

  redis-replica:
    image: redis:7-alpine
    hostname: redis-replica
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes:
      - redis_replica_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf --replicaof redis-primary 6379
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-replica
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s

  # Sentinel: 3 实例分布在 3 个 Manager 节点（S1/S2/S3）
  # quorum=2，需要至少 2 个 Sentinel 同意才触发故障转移
  redis-sentinel:
    image: redis:7-alpine
    configs:
      - source: redis_sentinel_conf
        target: /etc/redis/sentinel.conf
    # Sentinel 运行时会修改自身配置文件，需要可写副本
    entrypoint: ["sh", "-c"]
    command:
      - |
        cp /etc/redis/sentinel.conf /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ══════════════════════════════════════════════════
  # 入口层 — Nginx + Certbot（约束到 Gateway 节点 S3）
  # mode: ingress — 任意节点 IP 均可接入（Swarm 路由网格）
  # nginx 和 certbot 共享证书卷，必须在同一节点
  # ══════════════════════════════════════════════════

  nginx:
    image: nginx:1-alpine
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - target: 80
        published: 80
        mode: ingress
      - target: 443
        published: 443
        mode: ingress
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == gateway
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s

  certbot:
    image: certbot/certbot
    configs:
      - source: certbot_entrypoint
        target: /entrypoint.sh
        mode: 0755
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-api.find345.site}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@find345.site}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /entrypoint.sh
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == gateway
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 30s

  # ══════════════════════════════════════════════════
  # 应用层 — 微服务（约束到 Worker 节点 S4/S5）
  # 单副本部署，start-first 滚动更新
  # 扩容时调整 replicas: 2 并添加 reservations
  # ══════════════════════════════════════════════════

  api-gateway:
    image: ${REGISTRY}/ecom-api-gateway:${TAG:-latest}
    environment:
      API_GATEWAY_PORT: "3000"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@postgres-primary:5432/ecommerce"
        exec bun run apps/api-gateway/src/index.ts
    networks:
      - frontend_net
      - app_net
      - data_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  user-service:
    image: ${REGISTRY}/ecom-user-service:${TAG:-latest}
    environment:
      USER_SERVICE_PORT: "3001"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@postgres-primary:5432/ecommerce"
        exec bun run services/user-service/src/index.ts
    networks:
      - app_net
      - data_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3001/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  product-service:
    image: ${REGISTRY}/ecom-product-service:${TAG:-latest}
    environment:
      PRODUCT_SERVICE_PORT: "3002"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@postgres-primary:5432/ecommerce"
        exec bun run services/product-service/src/index.ts
    networks:
      - app_net
      - data_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3002/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  cart-service:
    image: ${REGISTRY}/ecom-cart-service:${TAG:-latest}
    environment:
      CART_SERVICE_PORT: "3003"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      PRODUCT_SERVICE_URL: http://product-service:3002
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@postgres-primary:5432/ecommerce"
        exec bun run services/cart-service/src/index.ts
    networks:
      - app_net
      - data_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3003/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  order-service:
    image: ${REGISTRY}/ecom-order-service:${TAG:-latest}
    environment:
      ORDER_SERVICE_PORT: "3004"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      USER_SERVICE_URL: http://user-service:3001
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@postgres-primary:5432/ecommerce"
        exec bun run services/order-service/src/index.ts
    networks:
      - app_net
      - data_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3004/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

# ══════════════════════════════════════════════════
# VPC 网络 — 三层 Overlay 隔离
# ══════════════════════════════════════════════════
#
#  frontend_net ──┐
#    nginx ←→ api-gateway
#                 ├── app_net
#           api-gateway ←→ user/product/cart/order-service
#                              ├── data_net
#                         微服务 ←→ postgres / redis
#
#  nginx 无法访问微服务和数据库
#  api-gateway 无法直连数据库（需经微服务）
#  数据库对外完全隔离

networks:
  frontend_net:
    driver: overlay
    attachable: false
  app_net:
    driver: overlay
    attachable: false
  data_net:
    driver: overlay
    attachable: false
    internal: true

# ══════════════════════════════════════════════════
# 持久化卷 — 本地卷（通过 placement 约束固定到特定节点）
# ══════════════════════════════════════════════════

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_primary_data:
  redis_replica_data:
  certbot_certs:
  certbot_webroot:

# ══════════════════════════════════════════════════
# Secrets — 部署前通过 deploy.sh 创建
# ══════════════════════════════════════════════════

secrets:
  postgres_password:
    external: true
  jwt_access_secret:
    external: true
  jwt_refresh_secret:
    external: true
  internal_secret:
    external: true

# ══════════════════════════════════════════════════
# Configs — 配置文件挂载（路径相对于本文件位置）
# ══════════════════════════════════════════════════

configs:
  pg_conf:
    file: ../postgres/postgresql.conf
  pg_init_sql:
    file: ../postgres/init.sql
  pg_init_replication:
    file: ./pg-init-replication.sh
  pg_replica_conf:
    file: ./pg-replica.conf
  redis_conf:
    file: ../redis/redis.conf
  redis_sentinel_conf:
    file: ./redis-sentinel.conf
  nginx_conf:
    file: ./nginx.conf
  certbot_entrypoint:
    file: ./certbot-entrypoint.sh
