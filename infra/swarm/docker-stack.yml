# Docker Swarm Stack — 企业级电商平台生产部署
# 5 节点集群：S1/S2 数据层(Manager), S3 入口层(Manager), S4/S5 应用层(Worker)
#
# 前置要求：
#   1. 构建并推送镜像到 Registry（设置 REGISTRY 环境变量）
#   2. 运行 deploy.sh 初始化集群、创建 Secrets
#
# 部署命令：
#   REGISTRY=your-registry.com/org TAG=v1.0.0 \
#     docker stack deploy -c docker-stack.yml ecom

version: "3.8"

services:
  # ══════════════════════════════════════════════════
  # 基础设施层 — etcd 分布式共识（Patroni Leader 选举）
  # 3 节点集群，分布在 S1(db-1)、S2(db-2)、S3(gateway)
  # ══════════════════════════════════════════════════

  etcd-1:
    image: quay.io/coreos/etcd:v3.5.17
    hostname: etcd-1
    environment:
      ETCD_NAME: etcd-1
      ETCD_DATA_DIR: /etcd-data
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-1:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-1:2379
      ETCD_INITIAL_CLUSTER: etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: ecom-etcd-cluster
    volumes:
      - etcd1_data:/etcd-data
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd-2:
    image: quay.io/coreos/etcd:v3.5.17
    hostname: etcd-2
    environment:
      ETCD_NAME: etcd-2
      ETCD_DATA_DIR: /etcd-data
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-2:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-2:2379
      ETCD_INITIAL_CLUSTER: etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: ecom-etcd-cluster
    volumes:
      - etcd2_data:/etcd-data
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-2
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd-3:
    image: quay.io/coreos/etcd:v3.5.17
    hostname: etcd-3
    environment:
      ETCD_NAME: etcd-3
      ETCD_DATA_DIR: /etcd-data
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-3:2380
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-3:2379
      ETCD_INITIAL_CLUSTER: etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: ecom-etcd-cluster
    volumes:
      - etcd3_data:/etcd-data
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == gateway
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ══════════════════════════════════════════════════
  # 基础设施层 — Patroni（PostgreSQL 高可用管理）
  # 两个独立服务（非 replicas:2），确保 HAProxy 能用稳定 DNS 做健康检查
  # ══════════════════════════════════════════════════

  patroni-1:
    image: ${REGISTRY}/ecom-patroni:${TAG:-latest}
    hostname: patroni-1
    environment:
      PATRONI_NAME: patroni-1
      PGDATA: /var/lib/postgresql/data
    secrets:
      - postgres_password
      - replication_password
    configs:
      - source: patroni_yml
        target: /etc/patroni/patroni.yml
      - source: patroni_post_init
        target: /usr/local/bin/post-init.sh
        mode: 0755
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-1
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  patroni-2:
    image: ${REGISTRY}/ecom-patroni:${TAG:-latest}
    hostname: patroni-2
    environment:
      PATRONI_NAME: patroni-2
      PGDATA: /var/lib/postgresql/data
    secrets:
      - postgres_password
      - replication_password
    configs:
      - source: patroni_yml
        target: /etc/patroni/patroni.yml
      - source: patroni_post_init
        target: /usr/local/bin/post-init.sh
        mode: 0755
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-2
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  # ══════════════════════════════════════════════════
  # 基础设施层 — HAProxy（PG 连接路由）
  # 通过 Patroni REST API 自动发现 Leader，应用只需连 haproxy:5432
  # ══════════════════════════════════════════════════

  haproxy:
    image: haproxy:2.9-alpine
    hostname: haproxy
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    ports:
      - target: 7000
        published: 7000
        mode: ingress
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ══════════════════════════════════════════════════
  # 基础设施层 — Redis（约束到 Manager/数据节点）
  # ══════════════════════════════════════════════════

  redis-primary:
    image: redis:7-alpine
    hostname: redis-primary
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes:
      - redis_primary_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s

  redis-replica:
    image: redis:7-alpine
    hostname: redis-replica
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes:
      - redis_replica_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf --replicaof redis-primary 6379
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s

  # Sentinel: 3 实例分布在 3 个 Manager 节点（S1/S2/S3）
  # quorum=2，需要至少 2 个 Sentinel 同意才触发故障转移
  redis-sentinel:
    image: redis:7-alpine
    configs:
      - source: redis_sentinel_conf
        target: /etc/redis/sentinel.conf
    # Sentinel 运行时会修改自身配置文件，需要可写副本
    entrypoint: ["sh", "-c"]
    command:
      - |
        cp /etc/redis/sentinel.conf /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ══════════════════════════════════════════════════
  # 入口层 — Caddy 反向代理（约束到 Gateway 节点 S3）
  # ══════════════════════════════════════════════════

  caddy:
    image: caddy:2-alpine
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == gateway
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ══════════════════════════════════════════════════
  # 应用层 — 微服务（约束到 Worker 节点 S4/S5）
  # 单副本部署，start-first 滚动更新
  # 扩容时调整 replicas: 2 并添加 reservations
  # ══════════════════════════════════════════════════

  api-gateway:
    image: ${REGISTRY}/ecom-api-gateway:${TAG:-latest}
    environment:
      API_GATEWAY_PORT: "3000"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@haproxy:5432/ecommerce"
        exec bun run apps/api-gateway/src/index.ts
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  user-service:
    image: ${REGISTRY}/ecom-user-service:${TAG:-latest}
    environment:
      USER_SERVICE_PORT: "3001"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@haproxy:5432/ecommerce"
        exec bun run services/user-service/src/index.ts
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3001/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  product-service:
    image: ${REGISTRY}/ecom-product-service:${TAG:-latest}
    environment:
      PRODUCT_SERVICE_PORT: "3002"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@haproxy:5432/ecommerce"
        exec bun run services/product-service/src/index.ts
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3002/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  cart-service:
    image: ${REGISTRY}/ecom-cart-service:${TAG:-latest}
    environment:
      CART_SERVICE_PORT: "3003"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      PRODUCT_SERVICE_URL: http://product-service:3002
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@haproxy:5432/ecommerce"
        exec bun run services/cart-service/src/index.ts
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3003/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  order-service:
    image: ${REGISTRY}/ecom-order-service:${TAG:-latest}
    environment:
      ORDER_SERVICE_PORT: "3004"
      REDIS_URL: redis://redis-primary:6379
      NODE_ENV: production
      LOG_LEVEL: info
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      USER_SERVICE_URL: http://user-service:3001
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - internal_secret
      - postgres_password
    entrypoint: ["sh", "-c"]
    command:
      - |
        export JWT_ACCESS_SECRET=$$(cat /run/secrets/jwt_access_secret)
        export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret)
        export INTERNAL_SECRET=$$(cat /run/secrets/internal_secret)
        export DATABASE_URL="postgresql://postgres:$$(cat /run/secrets/postgres_password)@haproxy:5432/ecommerce"
        exec bun run services/order-service/src/index.ts
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3004/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

# ══════════════════════════════════════════════════
# 网络 — Overlay 跨节点通信
# ══════════════════════════════════════════════════

networks:
  app_net:
    driver: overlay
    attachable: true

# ══════════════════════════════════════════════════
# 持久化卷 — 本地卷（通过 placement 约束固定到特定节点）
# ══════════════════════════════════════════════════

volumes:
  pg_primary_data:
  pg_replica_data:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  redis_primary_data:
  redis_replica_data:
  caddy_data:
  caddy_config:

# ══════════════════════════════════════════════════
# Secrets — 部署前通过 deploy.sh 创建
# ══════════════════════════════════════════════════

secrets:
  postgres_password:
    external: true
  replication_password:
    external: true
  jwt_access_secret:
    external: true
  jwt_refresh_secret:
    external: true
  internal_secret:
    external: true

# ══════════════════════════════════════════════════
# Configs — 配置文件挂载（路径相对于本文件位置）
# ══════════════════════════════════════════════════

configs:
  patroni_yml:
    file: ../patroni/patroni.yml
  patroni_post_init:
    file: ../patroni/post-init.sh
  haproxy_cfg:
    file: ../haproxy/haproxy.cfg
  redis_conf:
    file: ../redis/redis.conf
  redis_sentinel_conf:
    file: ./redis-sentinel.conf
  caddyfile:
    file: ./Caddyfile.prod
