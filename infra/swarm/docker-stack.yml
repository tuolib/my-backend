# ═══════════════════════════════════════════════════════════════
# Docker Swarm Stack — 电商平台生产部署
# ═══════════════════════════════════════════════════════════════
#
#   S1 Manager  db-primary   PG主 + Redis主 + Sentinel
#   S2 Manager  db-replica   PG从 + Redis从 + Sentinel
#   S3 Manager  gateway      Nginx + Certbot + Sentinel
#   S4 Worker   (auto)       API Gateway + 微服务
#   S5 Worker   (auto)       微服务
#
#   public_net   nginx <-> api-gateway          (DMZ)
#   service_net  api-gateway <-> 微服务          (内部通信)
#   data_net     微服务 <-> PG/Redis             (internal)

# ── YAML 锚点 ──

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: info
  REDIS_URL: redis://redis-primary:6379

x-app-healthcheck: &app-healthcheck
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

x-app-deploy: &app-deploy
  placement:
    constraints:
      - node.role == worker
  update_config:
    parallelism: 1
    delay: 15s
    order: start-first
    failure_action: rollback
    monitor: 30s
  rollback_config:
    parallelism: 1
    order: stop-first
  resources:
    limits:
      cpus: "0.5"
      memory: 512M
    reservations:
      memory: 256M
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 5

x-app-secrets: &app-secrets
  - jwt_access_secret
  - jwt_refresh_secret
  - internal_secret
  - postgres_password

# 所有应用服务共享：secrets + 共享 entrypoint + 优雅停机 + 日志轮转
x-app-base: &app-base
  secrets: *app-secrets
  configs:
    - source: app_entrypoint
      target: /app-entrypoint.sh
      mode: 0755
  entrypoint: /app-entrypoint.sh
  stop_grace_period: 30s
  logging: *logging

services:

  # ═══ DATA LAYER ═══

  postgres-primary:
    image: postgres:16-alpine
    hostname: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ecommerce
    secrets:
      - postgres_password
    configs:
      - source: pg_conf
        target: /etc/postgresql/postgresql.conf
      - source: pg_init_sql
        target: /docker-entrypoint-initdb.d/01-init.sql
      - source: pg_init_replication
        target: /docker-entrypoint-initdb.d/02-replication.sh
        mode: 0755
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
    command: >-
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c wal_level=replica
      -c max_wal_senders=5
      -c max_replication_slots=5
      -c hot_standby=on
    networks: [data_net]
    stop_grace_period: 60s
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db-primary]
      resources:
        limits:   { cpus: "1.0", memory: 1024M }
        reservations: { memory: 512M }
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  postgres-replica:
    image: postgres:16-alpine
    hostname: pg-replica
    secrets: [postgres_password]
    configs:
      - source: pg_replica_conf
        target: /etc/postgresql/postgresql.conf
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        chown -R postgres:postgres /var/lib/postgresql/data
        chmod 700 /var/lib/postgresql/data
        if [ ! -s "/var/lib/postgresql/data/PG_VERSION" ]; then
          echo "=== Initializing replica from primary ==="
          until PGPASSWORD=$$(cat /run/secrets/postgres_password) pg_isready -h postgres-primary -U postgres; do
            echo "Waiting for primary..."
            sleep 3
          done
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=$$(cat /run/secrets/postgres_password) gosu postgres pg_basebackup \
            -h postgres-primary -U postgres -D /var/lib/postgresql/data \
            -Fp -Xs -R -P
          echo "=== Replica initialized ==="
        fi
        exec gosu postgres postgres -c config_file=/etc/postgresql/postgresql.conf
    networks: [data_net]
    stop_grace_period: 60s
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db-replica]
      resources:
        limits:   { cpus: "1.0", memory: 1024M }
        reservations: { memory: 512M }
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  redis-primary:
    image: redis:7-alpine
    hostname: redis-primary
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes: [redis_primary_data:/data]
    command: redis-server /usr/local/etc/redis/redis.conf
    networks: [data_net]
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db-primary]
      resources:
        limits:   { cpus: "0.5", memory: 512M }
        reservations: { memory: 256M }
      restart_policy: { condition: on-failure, delay: 5s }

  redis-replica:
    image: redis:7-alpine
    hostname: redis-replica
    configs:
      - source: redis_conf
        target: /usr/local/etc/redis/redis.conf
    volumes: [redis_replica_data:/data]
    command: redis-server /usr/local/etc/redis/redis.conf --replicaof redis-primary 6379
    networks: [data_net]
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == db-replica]
      resources:
        limits:   { cpus: "0.5", memory: 512M }
        reservations: { memory: 256M }
      restart_policy: { condition: on-failure, delay: 5s }

  redis-sentinel:
    image: redis:7-alpine
    configs:
      - source: redis_sentinel_conf
        target: /etc/redis/sentinel.conf
    entrypoint: ["sh", "-c", "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && exec redis-sentinel /tmp/sentinel.conf"]
    networks: [data_net]
    logging: *logging
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 3
      placement:
        constraints: [node.role == manager]
        preferences: [{ spread: node.id }]
      resources:
        limits: { cpus: "0.1", memory: 64M }
      restart_policy: { condition: on-failure, delay: 5s }

  # ═══ GATEWAY LAYER ═══

  nginx:
    image: nginx:1-alpine
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - { target: 80,  published: 80,  mode: ingress }
      - { target: 443, published: 443, mode: ingress }
    networks: [public_net]
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == gateway]
      resources:
        limits:   { cpus: "0.5", memory: 256M }
        reservations: { memory: 128M }
      update_config: { order: start-first, failure_action: rollback }
      restart_policy: { condition: on-failure, delay: 5s, max_attempts: 10 }

  certbot:
    image: certbot/certbot
    configs:
      - source: certbot_entrypoint
        target: /entrypoint.sh
        mode: 0755
    environment:
      CERTBOT_DOMAIN: ${CERTBOT_DOMAIN:-api.find345.site}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@find345.site}
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /entrypoint.sh
    logging: *logging
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.role == gateway]
      resources:
        limits: { cpus: "0.1", memory: 64M }
      restart_policy: { condition: on-failure, delay: 30s }

  # ═══ APPLICATION LAYER ═══

  api-gateway:
    <<: *app-base
    image: ${REGISTRY}/ecom-api-gateway:${TAG:-latest}
    environment:
      <<: *app-env
      API_GATEWAY_PORT: "3000"
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    command: bun run apps/api-gateway/src/index.ts
    networks: [public_net, service_net, data_net]
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3000/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    deploy:
      <<: *app-deploy
      replicas: 1

  user-service:
    <<: *app-base
    image: ${REGISTRY}/ecom-user-service:${TAG:-latest}
    environment:
      <<: *app-env
      USER_SERVICE_PORT: "3001"
    command: bun run services/user-service/src/index.ts
    networks: [service_net, data_net]
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3001/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    deploy:
      <<: *app-deploy
      replicas: 1

  product-service:
    <<: *app-base
    image: ${REGISTRY}/ecom-product-service:${TAG:-latest}
    environment:
      <<: *app-env
      PRODUCT_SERVICE_PORT: "3002"
    command: bun run services/product-service/src/index.ts
    networks: [service_net, data_net]
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3002/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    deploy:
      <<: *app-deploy
      replicas: 1

  cart-service:
    <<: *app-base
    image: ${REGISTRY}/ecom-cart-service:${TAG:-latest}
    environment:
      <<: *app-env
      CART_SERVICE_PORT: "3003"
      PRODUCT_SERVICE_URL: http://product-service:3002
    command: bun run services/cart-service/src/index.ts
    networks: [service_net, data_net]
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3003/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    deploy:
      <<: *app-deploy
      replicas: 1

  order-service:
    <<: *app-base
    image: ${REGISTRY}/ecom-order-service:${TAG:-latest}
    environment:
      <<: *app-env
      ORDER_SERVICE_PORT: "3004"
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      USER_SERVICE_URL: http://user-service:3001
    command: bun run services/order-service/src/index.ts
    networks: [service_net, data_net]
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3004/health',{method:'POST'}).then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    deploy:
      <<: *app-deploy
      replicas: 1

# ═══ VPC NETWORKS ═══
#
#  public_net ── nginx <-> api-gateway
#  service_net ── api-gateway <-> 微服务
#  data_net ── 微服务 <-> PG/Redis (internal, 无外部路由)

networks:
  public_net:  { driver: overlay }
  service_net: { driver: overlay }
  data_net:    { driver: overlay, internal: true }

volumes:
  pg_primary_data:
  pg_replica_data:
  redis_primary_data:
  redis_replica_data:
  certbot_certs:
  certbot_webroot:

secrets:
  postgres_password: { external: true }
  jwt_access_secret: { external: true }
  jwt_refresh_secret: { external: true }
  internal_secret: { external: true }

configs:
  pg_conf:            { file: ../postgres/postgresql.conf }
  pg_init_sql:        { file: ../postgres/init.sql }
  pg_init_replication: { file: ./pg-init-replication.sh }
  pg_replica_conf:    { file: ./pg-replica.conf }
  redis_conf:         { file: ../redis/redis.conf }
  redis_sentinel_conf: { file: ./redis-sentinel.conf }
  nginx_conf:         { file: ./nginx.conf }
  certbot_entrypoint: { file: ./certbot-entrypoint.sh }
  app_entrypoint:     { file: ./app-entrypoint.sh }
