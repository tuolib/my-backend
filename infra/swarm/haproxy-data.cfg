# HAProxy — PG + Redis 连接代理（合并）
#
# PG:    应用 → :5432 → 当前 Patroni Primary（通过 REST API 健康检查）
# Redis: 应用 → :6379 → 当前 Redis Master（通过 INFO replication 检测）

global
    maxconn 1000
    log stdout format raw local0

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    retries 3
    timeout connect 5s
    timeout client  300s
    timeout server  300s
    timeout check   3s

# ══════ PostgreSQL ══════

frontend pg_front
    bind *:5432
    default_backend pg_back

backend pg_back
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-1 patroni-1:5432 check port 8008
    server patroni-2 patroni-2:5432 check port 8008

# ══════ Redis ══════

frontend redis_front
    bind *:6379
    default_backend redis_back

backend redis_back
    option tcp-check
    tcp-check send "PING\r\n"
    tcp-check expect string +PONG
    tcp-check send "INFO replication\r\n"
    tcp-check expect string role:master
    tcp-check send "QUIT\r\n"
    tcp-check expect string +OK
    default-server inter 3s fall 3 rise 2
    server redis-primary redis-primary:6379 check
    server redis-replica redis-replica:6379 check

# ══════ Stats + Prometheus 指标 ══════

frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    http-request use-service prometheus-exporter if { path /metrics }
