# Nginx — Swarm 反向代理 + SSL 终结
#
# client :443 -> nginx -> api-gateway:3000
# certbot 自动签发/续签（共享卷 /etc/letsencrypt）

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;

    keepalive_timeout 30s;
    keepalive_requests 1000;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    client_max_body_size 10m;

    log_format json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"rt":$request_time,'
            '"upstream_rt":"$upstream_response_time",'
            '"ua":"$http_user_agent"'
        '}';

    access_log /dev/stdout json;
    error_log  /dev/stderr warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/xml;

    # 限流 + 限连（nginx 层兜底）
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Docker Swarm DNS
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api_gateway {
        server api-gateway:3000;
        keepalive 32;
    }

    # ── HTTP :80 ──
    server {
        listen 80;
        server_name _;

        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS :443 ──
    server {
        listen 443 ssl http2;
        server_name api.find345.site;

        ssl_certificate     /etc/letsencrypt/live/api.find345.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.find345.site/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        limit_req  zone=api  burst=100 nodelay;
        limit_conn zone=conn 50;

        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            proxy_hide_header X-Powered-By;

            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
        }
    }
}
