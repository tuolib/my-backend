# Nginx — SSL 终结 + 反向代理
#
# 证书从 Docker Secret 读取，不依赖本地卷，可调度到任意节点
# ACME challenge 代理到 certbot 服务（standalone 模式 :8080）

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Docker 内置 DNS（服务 IP 变更时自动刷新）
    resolver 127.0.0.11 valid=10s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # HTTP → HTTPS 重定向 + ACME challenge
    server {
        listen 80;
        server_name _;

        # Certbot ACME HTTP-01 challenge（代理到 certbot standalone :8080）
        location /.well-known/acme-challenge/ {
            set $upstream_certbot certbot;
            proxy_pass http://$upstream_certbot:8080;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL 证书（从 Docker Secret 读取）
        ssl_certificate /run/secrets/ssl_cert;
        ssl_certificate_key /run/secrets/ssl_key;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # 安全头
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # 请求体大小限制
        client_max_body_size 10m;

        # API 流量 → API Gateway（变量解析，避免启动时 DNS 失败）
        location / {
            set $upstream_api_gateway api-gateway;
            proxy_pass http://$upstream_api_gateway:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
