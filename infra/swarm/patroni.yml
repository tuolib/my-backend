# Patroni 配置 — PostgreSQL 自动故障转移
#
# 节点特定值通过环境变量注入:
#   PATRONI_NAME, PATRONI_POSTGRESQL_CONNECT_ADDRESS,
#   PATRONI_RESTAPI_CONNECT_ADDRESS, PATRONI_SUPERUSER_PASSWORD,
#   PATRONI_REPLICATION_PASSWORD

scope: ecom-pg
namespace: /ecom

etcd3:
  hosts: etcd-1:2379,etcd-2:2379,etcd-3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        max_connections: 200
        shared_buffers: 512MB
        effective_cache_size: 1536MB
        work_mem: 8MB
        maintenance_work_mem: 128MB
        wal_buffers: 16MB
        checkpoint_completion_target: 0.9
        max_wal_size: 2GB
        random_page_cost: 1.1
        effective_io_concurrency: 200
        log_min_duration_statement: 200
        log_statement: none
        log_timezone: UTC
        timezone: UTC

  initdb:
    - encoding: UTF8
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  post_bootstrap: /etc/patroni/post-bootstrap.sh

postgresql:
  listen: 0.0.0.0:5432
  data_dir: /var/lib/postgresql/data
  pgpass: /tmp/pgpass
  authentication:
    superuser:
      username: postgres
    replication:
      username: replicator

restapi:
  listen: 0.0.0.0:8008

tags:
  nofailover: false
  noloadbalance: false
