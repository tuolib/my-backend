global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 60s
  timeout server 60s

frontend pg_ro
  bind *:5432
  default_backend postgres_replicas

backend postgres_replicas
  balance roundrobin
  option tcp-check
  default-server inter 2s rise 2 fall 3
  server replica1 postgres-replica-1:5432 check
