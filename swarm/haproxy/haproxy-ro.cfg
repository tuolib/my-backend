global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 60s
  timeout server 60s

frontend pg_ro
  bind *:5432
  default_backend postgres_replicas

backend postgres_replicas
  balance roundrobin
  option tcp-check
  default-server inter 2s rise 2 fall 3
  server replica1 postgres-replica-1:5432 check
  server replica2 postgres-replica-2:5432 check
  server replica3 postgres-replica-3:5432 check
  server replica4 postgres-replica-4:5432 check
  server replica5 postgres-replica-5:5432 check
  server replica6 postgres-replica-6:5432 check
  server replica7 postgres-replica-7:5432 check
  server replica8 postgres-replica-8:5432 check
  server replica9 postgres-replica-9:5432 check
