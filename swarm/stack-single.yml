x-api-env: &api_env
  DATABASE_WRITE_URL: "postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@pgbouncer-rw:5432/${POSTGRES_DB:-mydb}"
  DATABASE_READ_URL: "postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@pgbouncer-ro:5432/${POSTGRES_DB:-mydb}"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "${JWT_SECRET:-change-me-in-prod}"
  DB_POOL_MAX: "${DB_POOL_MAX:-5}"
  DB_STRICT_READ_READINESS: "${DB_STRICT_READ_READINESS:-false}"
  NODE_ENV: "production"
  LOG_LEVEL: "${LOG_LEVEL:-info}"

services:
  caddy:
    image: caddy:2.8-alpine
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: 80
        protocol: tcp
      - target: 443
        published: 443
        protocol: tcp
    networks:
      - edge
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api:
    image: "${IMAGE_REPOSITORY:-ghcr.io/your-org/ho-api}:${IMAGE_TAG:-latest}"
    environment:
      <<: *api_env
    networks:
      - backend
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 20s
    deploy:
      replicas: ${API_REPLICAS:-2}
      endpoint_mode: vip
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 5s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
        delay: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-mydb}"
      REPLICATION_PASSWORD: "${POSTGRES_REPLICATION_PASSWORD:-repl_password}"
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=256MB
      - -c
      - hot_standby=on
      - -c
      - password_encryption=md5
    configs:
      - source: postgres_primary_init
        target: /docker-entrypoint-initdb.d/init-replication.sh
        mode: 0555
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres-replica-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-mydb}"
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres-primary
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: "${POSTGRES_REPLICATION_PASSWORD:-repl_password}"
    entrypoint: ["bash", "/replica-setup.sh"]
    configs:
      - source: postgres_replica_setup
        target: /replica-setup.sh
        mode: 0555
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  haproxy-ro:
    image: haproxy:2.9-alpine
    configs:
      - source: haproxy_ro_single_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  pgbouncer-rw:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres-primary
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-user}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      DB_NAME: "${POSTGRES_DB:-mydb}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "${PGBOUNCER_MAX_CLIENT_CONN:-5000}"
      DEFAULT_POOL_SIZE: "${PGBOUNCER_DEFAULT_POOL_SIZE:-500}"
      RESERVE_POOL_SIZE: "${PGBOUNCER_RESERVE_POOL_SIZE:-100}"
      AUTH_TYPE: md5
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  pgbouncer-ro:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: haproxy-ro
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-user}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      DB_NAME: "${POSTGRES_DB:-mydb}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "${PGBOUNCER_MAX_CLIENT_CONN:-5000}"
      DEFAULT_POOL_SIZE: "${PGBOUNCER_DEFAULT_POOL_SIZE:-500}"
      RESERVE_POOL_SIZE: "${PGBOUNCER_RESERVE_POOL_SIZE:-100}"
      AUTH_TYPE: md5
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  edge:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.enable_ipv6: "true"
  backend:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.enable_ipv6: "true"

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_primary_data:
  postgres_replica_1_data:

configs:
  caddyfile:
    name: caddyfile-${CADDYFILE_HASH}
    file: ./caddy/Caddyfile
  haproxy_ro_single_cfg:
    name: haproxy_ro_single_cfg-${HAPROXY_RO_SINGLE_CFG_HASH}
    file: ./haproxy/haproxy-ro-single.cfg
  postgres_primary_init:
    name: postgres_primary_init-${POSTGRES_PRIMARY_INIT_HASH}
    file: ../sim/postgres/primary-init.sh
  postgres_replica_setup:
    name: postgres_replica_setup-${POSTGRES_REPLICA_SETUP_HASH}
    file: ../sim/postgres/replica-setup.sh
